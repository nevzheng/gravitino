---

paths:

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/topics:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"

    get:
      tags:
        - topic
      summary: List topics
      operationId: listTopics
      description: |
        Lists live topics by default. `include=deleted` returns recoverable metadata-deletion
        records and supports exact `name` and `id` filters. Deleted collection responses do not
        carry an ETag; read an exact deleted topic before restoring it. Deleted-topic reads are
        temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/topicNameFilter"
        - $ref: "#/components/parameters/topicIdFilter"
      responses:
        "200":
          description: Live topic identifiers or deleted metadata records
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/EntityListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted topics in the schema
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - topic
      summary: Create topic
      operationId: createTopic
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicCreateRequest"
            examples:
              TopicCreateRequest:
                $ref: "#/components/examples/TopicCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/TopicResponse"
        "409":
          description: Conflict - The target topic already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TopicAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/TopicAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/topics/{topic}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"
      - $ref: "./openapi.yaml#/components/parameters/topic"

    get:
      tags:
        - topic
      summary: Get topic
      operationId: loadTopic
      description: |
        Returns the specified live topic by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact metadata tombstone under the live parent
        path. The deleted representation carries a strong ETag for PATCH. This read does not
        inspect Kafka or any other messaging system.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedTopicId"
      responses:
        "200":
          description: A live topic or one exact deleted-topic metadata generation
          headers:
            ETag:
              description: Returned only for an exact deleted-topic read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/TopicResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted topic
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The target topic does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchTopicException:
                  $ref: "#/components/examples/NoSuchTopicException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - topic
      summary: Restore soft-deleted topic metadata
      operationId: restoreTopic
      description: |
        Makes one exact soft-deleted Gravitino topic-metadata generation active again. The
        immutable `id`, path name, and strong `If-Match` value bind PATCH to the exact
        representation returned by GET.

        Restore is metadata-only. It does not contact Kafka or another messaging system, recreate
        or validate a downstream topic, or apply the restored properties to that system. Kafka
        topic deletion is irreversible through Gravitino today, so the downstream topic may be
        absent or may have been independently recreated with different configuration. The caller
        must reconcile downstream state separately. The same accepted ETag can be replayed only
        while this generation remains latest and the exact topic ID is live at its original parent
        and name.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedTopicInclude"
        - $ref: "#/components/parameters/restoreTopicId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          $ref: "#/components/responses/TopicResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The token does not identify the requested topic ID and name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name or ID is occupied, a newer same-name tombstone exists, the parent
            changed, purge is in progress, or the tombstone predates complete deletion records.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - topic
      summary: Update topic
      operationId: alterTopic
      description: Update the specified topic in a schema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/TopicResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target topic does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchTopicException:
                  $ref: "#/components/examples/NoSuchTopicException"
        "409":
          description: Conflict - The target topic already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TopicAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/TopicAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - topic
      summary: Delete topic
      operationId: dropTopic
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:

  parameters:
    include:
      name: include
      in: query
      description: Select live topics or soft-deleted topic metadata records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    topicNameFilter:
      name: name
      in: query
      description: Exact topic-name filter
      required: false
      schema:
        type: string

    topicIdFilter:
      name: id
      in: query
      description: Immutable topic-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedTopicId:
      name: id
      in: query
      description: Immutable topic ID required for an exact deleted-topic read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreTopicId:
      name: id
      in: query
      description: Immutable ID of the soft-deleted topic metadata generation to restore
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedTopicInclude:
      name: include
      in: query
      description: Selects the exact deleted topic metadata targeted by this conditional PATCH
      required: true
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag returned by the exact deleted-topic GET
      required: true
      schema:
        type: string

  schemas:
    Topic:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the topic
        comment:
          type: string
          description: The comment of the topic
        properties:
          type: object
          description: The properties of the topic
          nullable: true
          default: {}
          additionalProperties:
            type: string

    TopicCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the topic
        comment:
          type: string
          description: The comment of the topic
          nullable: true
        properties:
          type: object
          description: The properties of the topic
          nullable: true
          default: {}
          additionalProperties:
            type: string

    TopicUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/TopicUpdateRequest"

    TopicUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/UpdateTopicCommentRequest"
        - $ref: "#/components/schemas/SetTopicPropertyRequest"
        - $ref: "#/components/schemas/RemoveTopicPropertyRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          updateComment: "#/components/schemas/UpdateTopicCommentRequest"
          setProperty: "#/components/schemas/SetTopicPropertyRequest"
          removeProperty: "#/components/schemas/RemoveTopicPropertyRequest"

    UpdateTopicCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - "updateComment"
        newComment:
          type: string
          description: The new comment of the topic
      example: {
        "@type": "updateComment",
        "newComment": "This is the new comment"
      }

    SetTopicPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - "setProperty"
        property:
          type: string
          description: The name of the property to set
        value:
          type: string
          description: The value of the property to set
      example: {
        "@type": "setProperty",
        "property": "key",
        "value": "value"
      }

    RemoveTopicPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - "removeProperty"
        property:
          type: string
          description: The name of the property to remove
      example: {
        "@type": "removeProperty",
        "property": "key"
      }

  responses:
    TopicResponse:
      description: Returns include the topic object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              topic:
                $ref: "#/components/schemas/Topic"
          examples:
            TopicResponse:
              $ref: "#/components/examples/TopicResponse"

  examples:
    TopicCreateRequest:
      value: {
        "name": "topic1",
        "comment": "This is a topic",
        "properties": {
          "partition-count": "1",
          "replication-factor": "1"
        }
      }

    TopicResponse:
      value: {
        "code": 0,
        "topic": {
          "name": "topic1",
          "comment": "This is a topic",
          "properties": {
            "partition-count": "1",
            "replication-factor": "1"
          }
        }
      }

    TopicAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "TopicAlreadyExistsException",
        "message": "Topic already exists",
        "stack": [
          "org.apache.gravitino.exceptions.TopicAlreadyExistsException: Topic already exists: topic1"
        ]
      }

    NoSuchTopicException:
      value: {
        "code": 1003,
        "type": "NoSuchTopicException",
        "message": "Topic does not exist",
        "stack": [
          "org.apache.gravitino.exceptions.NoSuchTopicException: Topic does not exist",
          "..."
        ]
      }


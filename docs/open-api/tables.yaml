---

paths:

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/tables:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"

    get:
      tags:
        - table
      summary: List tables
      operationId: listTables
      description: |
        Lists tables in the schema. With no query parameters, this operation preserves the
        existing behavior and returns only live table identifiers.

        `include=non-deleted` (the default) returns the existing identifier-only response and
        supports an optional exact `name` filter. `include=deleted` returns deletion records.
        Deleted records can be filtered by exact `name`, exact `id`, or both. A filter mismatch
        returns an empty collection. A name can match more than one deletion generation; an ID
        identifies at most one current tombstone.

        Collection responses do not carry an HTTP `ETag` because their members have independent
        versions. Before restoring, clients read one exact tombstone from the existing item URI.
        Deleted-table discovery is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/tableNameFilter"
        - $ref: "#/components/parameters/tableIdFilter"
      responses:
        "200":
          description: |
            Returns live table identifiers for `include=non-deleted`, or deleted-entity records
            for `include=deleted`.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/responses/EntityListResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "#/components/schemas/DeletedEntityListResponse"
              examples:
                TableListResponse:
                  $ref: "#/components/examples/TableListResponse"
                DeletedEntityListResponse:
                  $ref: "#/components/examples/DeletedEntityListResponse"
        "400":
          description: |
            Bad Request - `include` is unsupported, `id` is not a positive decimal string, or
            `id` is supplied for a non-deleted listing.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller is not authorized to list tables in the schema
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - table
      summary: Create table
      operationId: createTable
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableCreateRequest"
            examples:
              HiveTableCreate:
                $ref: "#/components/examples/HiveTableCreate"
              MysqlTableCreate:
                $ref: "#/components/examples/MysqlTableCreate"
              PostgresqlTableCreate:
                $ref: "#/components/examples/PostgresqlTableCreate"
              IcebergTableCreate:
                $ref: "#/components/examples/IcebergTableCreate"
              IcebergVariantTableCreate:
                $ref: "#/components/examples/IcebergVariantTableCreate"
      responses:
        "200":
          $ref: "#/components/responses/TableResponse"
        "409":
          description: Conflict - The target table already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TableAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/TableAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/tables/{table}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"
      - $ref: "./openapi.yaml#/components/parameters/table"

    get:
      tags:
        - table
      summary: Get table
      operationId: loadTable
      description: |
        Returns the specified live table by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID must select one exact tombstone under the same live
        parents. An exact mismatch returns `404` rather than an empty collection. A successful
        deleted read returns the restore token in both the body's `etag` field and a strong HTTP
        `ETag` header. Deleted-table reads are temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedTableId"
      responses:
        "200":
          description: A live table or one exact deleted-table generation
          headers:
            ETag:
              description: |
                Returned only for an exact deleted-table read. Use it as the restore request's
                `If-Match` value.
              schema:
                type: string
                example: '"deletion-77192-representation-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"'
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/TableResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "#/components/schemas/DeletedEntityResponse"
        "400":
          description: |
            Bad Request - `include` is unsupported, `include=deleted` is missing `id`, the ID is
            not a positive decimal string, or `id` is supplied for a live read.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller is not authorized to inspect this tombstone
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: |
            Not Found - The live table does not exist, or the deleted ID and path name do not
            identify one tombstone under the exact live parents.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchTableException:
                  $ref: "#/components/examples/NoSuchTableException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - table
      summary: Update table
      operationId: alterTable
      description: Updates the specified table in a schema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/TableResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target table does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchTableException:
                  $ref: "#/components/examples/NoSuchTableException"
        "409":
          description: Conflict - The target table already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TableAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/TableAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - table
      summary: Restore a soft-deleted table
      operationId: restoreTable
      description: |
        Makes one exact soft-deleted table generation active again. The immutable `id` selects
        the table, `{table}` asserts its original name, and `If-Match` conditionally applies the
        restore to the deletion generation returned by a preceding exact item read.

        Restore is metadata-only: it restores the table record and its nested Gravitino metadata.
        It never validates, loads, or recreates a table in the downstream catalog, and succeeds
        even when that downstream object is absent or inaccessible.

        The operation is idempotent only for the same table ID and deletion generation. If the
        precondition becomes stale, the client should re-read the tombstone and retry only when
        the same ID and deletion generation remain deleted, latest for the name, and restorable.
        The client must not silently switch to a newer tombstone.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedTableInclude"
        - $ref: "#/components/parameters/restoreTableId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          $ref: "#/components/responses/TableResponse"
        "400":
          description: |
            Bad Request - `include=deleted` is missing, the ID is invalid, the patch is malformed,
            or `deleted` is absent or not exactly `false`.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller is not a service administrator
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: |
            Not Found - The deletion token does not identify the requested table ID and name. A
            valid token whose immutable parent IDs no longer match the live path returns
            `409 PARENT_CHANGED`.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The restore cannot be completed without changing its meaning. This
            includes a live table occupying the name, the ID being active or reused for another
            logical entity, a newer tombstone existing for the name, an original parent being
            missing or replaced, an irreversible purge already being in progress, or a legacy
            tombstone lacking a complete deletion record. These conflicts are not automatically
            retried.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone's retention expired or it was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: |
            Precondition Failed - `If-Match` is stale because the exact deleted representation or
            its action-relevant deletion-record state changed. Re-read before making a bounded retry.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - The required `If-Match` header is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires `application/merge-patch+json`
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - table
      summary: Drop table
      operationId: dropTable
      parameters:
        - $ref: "#/components/parameters/purge"
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


components:
  parameters:
    include:
      name: include
      in: query
      description: Select live table identifiers or soft-deleted table records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    tableNameFilter:
      name: name
      in: query
      description: |
        Exact table-name filter. More than one deletion generation can have the same name. For a
        deleted listing, `name` and `id` must both match when supplied together.
      required: false
      schema:
        type: string

    tableIdFilter:
      name: id
      in: query
      description: |
        Immutable table-ID filter selecting one exact deletion record. This filter is supported
        only with `include=deleted`.
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    deletedTableId:
      name: id
      in: query
      description: |
        Immutable table ID. This parameter is required when `include=deleted` and rejected for a
        normal live-table read.
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    restoreTableId:
      name: id
      in: query
      description: Immutable ID of the soft-deleted table generation to restore
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    restoreDeletedTableInclude:
      name: include
      in: query
      description: Selects the exact deleted representation targeted by this conditional patch
      required: true
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: |
        Strong HTTP entity tag returned by an exact item read with `include=deleted&id=...`. It
        binds this request to the complete deleted representation and action-relevant deletion record
        state that the caller read. Wildcards, weak tags, and lists of tags are rejected. The
        response body's `etag` field contains the same opaque token without HTTP header quoting.
      required: true
      schema:
        type: string

    purge:
      name: purge
      in: query
      description: Removes both the metadata and the directory associated with the table completely and skipping trash.
      required: false
      schema:
        type: boolean
        default: false

  schemas:
    EntityRestoreRequest:
      type: object
      description: Merge patch that restores a soft-deleted metadata entity
      required:
        - deleted
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          description: Must be false to restore the selected deletion generation
          enum:
            - false

    DeletedEntity:
      type: object
      required:
        - deleted
        - id
        - deletionId
        - name
        - type
        - deletedAt
        - expiresAt
        - etag
        - latestForName
        - restorable
      properties:
        deleted:
          type: boolean
          description: Always true for a deleted-entity representation
          enum:
            - true
        id:
          type: string
          description: Immutable Gravitino entity ID
          example: "984273"
        deletionId:
          type: string
          description: Identifier for this deletion generation
          example: "77192"
        name:
          type: string
          description: Original metadata entity name
        type:
          type: string
          description: Metadata object type
          enum:
            - table
            - function
            - fileset
            - view
            - model
        deletedAt:
          type: integer
          format: int64
          description: Deletion time in milliseconds since the Unix epoch
        expiresAt:
          type: integer
          format: int64
          description: |
            Effective retention expiry in milliseconds since the Unix epoch, derived from
            deletedAt and the server's current global soft-delete retention setting
        deletedBy:
          type: string
          description: Principal that deleted the metadata entity, when available
          nullable: true
        version:
          type: integer
          format: int64
          description: Metadata version captured by this deletion record, when the entity is versioned
          minimum: 1
        etag:
          type: string
          description: |
            Opaque digest of the exact deleted representation and its action-relevant deletion record
            state. An exact item read returns the same token in a strong HTTP `ETag` header with
            entity-tag quoting.
          example: "deletion-77192-representation-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        latestForName:
          type: boolean
          description: Whether this is the most recent deletion generation with this name
        restorable:
          type: boolean
          description: Whether the server currently considers this deletion record restorable
        reason:
          type: string
          description: |
            Machine-readable reason the record is not restorable. This field is omitted when no
            reason applies and is required by the response DTO when `restorable=false`.
          nullable: true

    DeletedEntityResponse:
      type: object
      required:
        - code
        - deletedEntity
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        deletedEntity:
          $ref: "#/components/schemas/DeletedEntity"

    DeletedEntityListResponse:
      type: object
      required:
        - code
        - deletedEntities
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        deletedEntities:
          type: array
          description: Soft-deleted metadata records selected by the query filters
          items:
            $ref: "#/components/schemas/DeletedEntity"

    RecoveryConflictError:
      allOf:
        - $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        - type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Stable reason the requested restore cannot preserve its meaning
              enum:
                - NOT_LATEST_TOMBSTONE
                - ENTITY_ID_REUSED
                - NAME_OCCUPIED
                - PARENT_CHANGED
                - PURGE_IN_PROGRESS
                - LEGACY_TOMBSTONE

    TableCreateRequest:
      type: object
      required:
        - name
        - columns
      properties:
        name:
          type: string
          description: The name of the table
        columns:
          type: array
          description: A list of columns
          items:
            $ref: "#/components/schemas/Column"
        comment:
          type: string
          description: The comment of the table
          nullable: true
        properties:
          type: object
          description: A map of table properties
          nullable: true
          default: { }
          additionalProperties:
            type: string
        sortOrders:
          type: array
          description: Describes the sort order of the table data
          nullable: true
          default: [ ]
          items:
            $ref: "#/components/schemas/SortOrder"
        distribution:
          $ref: "#/components/schemas/Distribution"
        partitioning:
          type: array
          description: partitioning of the table data
          nullable: true
          default: [ ]
          items:
            $ref: "./partitioning.yaml#/components/schemas/PartitioningSpec"
        indexes:
          type: array
          description: Indexes of the table
          nullable: true
          default: [ ]
          items:
            $ref: "./indexes.yaml#/components/schemas/IndexSpec"

    Table:
      type: object
      description: A table object
      required:
        - name
        - columns
        - audit
      properties:
        name:
          type: string
          description: The name of the table
        columns:
          type: array
          description: A list of columns
          items:
            $ref: "#/components/schemas/Column"
        comment:
          type: string
          description: The comment of the table
          nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        properties:
          type: object
          description: A map of table properties
          nullable: true
          default: { }
          additionalProperties:
            type: string
        distribution:
          $ref: "#/components/schemas/Distribution"
        sortOrders:
          type: array
          description: Describes the sort order of the table data
          nullable: true
          default: [ ]
          items:
            $ref: "#/components/schemas/SortOrder"
        partitioning:
          type: array
          description: partitioning of the table data
          nullable: true
          default: [ ]
          items:
            $ref: "./partitioning.yaml#/components/schemas/PartitioningSpec"
        indexes:
          type: array
          description: Indexes of the table
          nullable: true
          default: [ ]
          items:
            $ref: "./indexes.yaml#/components/schemas/IndexSpec"

    Distribution:
      type: object
      description: Describes how data is distributed across partitions
      nullable: true
      required:
        - number
        - funcArgs
      properties:
        strategy:
          type: string
          description: The distribution strategy
          nullable: true
          default: "hash"
          enum:
            - "hash"
            - "range"
            - "even"
        number:
          type: integer
          description: The number of buckets/distribution
          format: int32
        funcArgs:
          type: array
          description: The arguments of the distribution function
          nullable: true
          default: [ ]
          items:
            $ref: "./expression.yaml#/components/schemas/FunctionArg"

    SortOrder:
      type: object
      required:
        - sortTerm
      properties:
        sortTerm:
          $ref: "./expression.yaml#/components/schemas/FunctionArg"
        direction:
          type: string
          description: The direction of the sort order
          enum:
            - "asc"
            - "desc"
          nullable: true
          default: "asc"
        nullOrdering:
          type: string
          description: ｜
            The sort order of null values.
            The default value is "nulls_first" if the direction is "asc", otherwise "nulls_last".
          enum:
            - "nulls_first"
            - "nulls_last"

    FieldNames:
      type: array
      description: The names of the fields, each field may be with multiple levels
      items:
        $ref: "#/components/schemas/FieldName"

    FieldName:
      type: array
      description: The name of the field, may be with multiple levels
      items:
        type: string

    ColumnDefaultValue:
      allOf:
        - $ref: "./expression.yaml#/components/schemas/FunctionArg"
      description: The default value of the column

    Column:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the column
        type:
          $ref: "./datatype.yaml#/components/schemas/DataType"
        comment:
          type: string
          description: The comment of the column
          nullable: true
        nullable:
          type: boolean
          description: Whether the column is nullable
          nullable: true
          default: true
        defaultValue:
          $ref: "#/components/schemas/ColumnDefaultValue"
        autoIncrement:
          type: boolean
          description: Whether the column is auto increment
          nullable: true
          default: false

    TableUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/TableUpdateRequest"

    TableUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/RenameTableRequest"
        - $ref: "#/components/schemas/UpdateTableCommentRequest"
        - $ref: "#/components/schemas/SetTablePropertyRequest"
        - $ref: "#/components/schemas/RemoveTablePropertyRequest"
        - $ref: "#/components/schemas/AddTableColumnRequest"
        - $ref: "#/components/schemas/RenameTableColumnRequest"
        - $ref: "#/components/schemas/UpdateTableColumnTypeRequest"
        - $ref: "#/components/schemas/UpdateTableColumnCommentRequest"
        - $ref: "#/components/schemas/UpdateTableColumnPositionRequest"
        - $ref: "#/components/schemas/UpdateTableColumnNullabilityRequest"
        - $ref: "#/components/schemas/UpdateTableColumnDefaultValueRequest"
        - $ref: "#/components/schemas/DeleteTableColumnRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/schemas/RenameTableRequest"
          updateComment: "#/components/schemas/UpdateTableCommentRequest"
          setProperty: "#/components/schemas/SetTablePropertyRequest"
          removeProperty: "#/components/schemas/RemoveTablePropertyRequest"
          addColumn: "#/components/schemas/AddTableColumnRequest"
          renameColumn: "#/components/schemas/RenameTableColumnRequest"
          updateColumnType: "#/components/schemas/UpdateTableColumnTypeRequest"
          updateColumnComment: "#/components/schemas/UpdateTableColumnCommentRequest"
          updateColumnPosition: "#/components/schemas/UpdateTableColumnPositionRequest"
          updateColumnNullability: "#/components/schemas/UpdateTableColumnNullabilityRequest"
          updateColumnDefaultValue: "#/components/schemas/UpdateTableColumnDefaultValueRequest"
          deleteColumn: "#/components/schemas/DeleteTableColumnRequest"

    RenameTableRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - "rename"
        newName:
          type: string
          description: The new name of the table
        newSchemaName:
          type: string
          description: The new schema name of the table, if not provided, the schema will not be changed
          nullable: true
      example: {
        "@type": "rename",
        "newName": "my_hive_table_new",
        "newSchemaName": "my_hive_schema_new"
      }

    UpdateTableCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - "updateComment"
        newComment:
          type: string
          description: The new comment of the table
      example: {
        "@type": "updateComment",
        "newComment": "This is my Hive table new comment"
      }

    SetTablePropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - "setProperty"
        property:
          type: string
          description: The name of the property to set
        value:
          type: string
          description: The value of the property to set
      example: {
        "@type": "setProperty",
        "property": "key1",
        "value": "value1_new"
      }

    RemoveTablePropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - "removeProperty"
        property:
          type: string
          description: The name of the property to remove
      example: {
        "@type": "removeProperty",
        "property": "key2"
      }

    AddTableColumnRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - type
      properties:
        "@type":
          type: string
          enum:
            - "addColumn"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to add
        type:
          $ref: "./datatype.yaml#/components/schemas/DataType"
          description: The type of the column to add
        comment:
          type: string
          description: The comment of the column to add
          nullable: true
        position:
          allOf:
            - $ref: "#/components/schemas/ColumnPosition"
          description: The position of the column to add
        nullable:
          type: boolean
          description: Whether the column to add is nullable
          nullable: true
          default: true
        autoIncrement:
          type: boolean
          description: Whether the column to add should auto increment
          nullable: true
          default: false
        defaultValue:
          allOf:
            - $ref: "#/components/schemas/ColumnDefaultValue"
          description: The default value of the column to add
      example: {
        "@type": "addColumn",
        "fieldName": [ "new_column" ],
        "type": "integer",
        "comment": "new integer column comment",
        "position": "first",
        "nullable": true,
        "autoIncrement": false,
        "defaultValue" : {
          "type": "literal",
          "dataType": "integer",
          "value": "1024"
        }
      }

    RenameTableColumnRequest:
      type: object
      required:
        - "@type"
        - oldFieldName
        - newFieldName
      properties:
        "@type":
          type: string
          enum:
            - "renameColumn"
        oldFieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to rename
        newFieldName:
          type: string
          description: The new name of the field
      example: {
        "@type": "renameColumn",
        "oldFieldName": [ "existing_column" ],
        "newFieldName": "existing_column_new"
      }

    UpdateTableColumnTypeRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - newType
      properties:
        "@type":
          type: string
          enum:
            - "updateColumnType"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to update
        newType:
          $ref: "./datatype.yaml#/components/schemas/DataType"
          description: The new type of the column
      example: {
        "@type": "updateColumnType",
        "fieldName": [ "existing_column" ],
        "newType": "string"
      }

    UpdateTableColumnCommentRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - "updateColumnComment"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to update
        newComment:
          type: string
          description: The new comment of the column
      example: {
        "@type": "updateColumnComment",
        "fieldName": [ "existing_column" ],
        "newComment": "existing column new comment"
      }

    UpdateTableColumnPositionRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - newPosition
      properties:
        "@type":
          type: string
          enum:
            - "updateColumnPosition"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to update
        newPosition:
          $ref: "#/components/schemas/ColumnPosition"
          description: The new position of the column
      example: {
        "@type": "updateColumnPosition",
        "fieldName": [ "existing_column" ],
        "newPosition": {
          "after": "existing_column"
        }
      }

    UpdateTableColumnNullabilityRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - nullable
      properties:
        "@type":
          type: string
          enum:
            - "updateColumnNullability"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to update
        nullable:
          type: boolean
          description: Whether the column is nullable
      example: {
        "@type": "updateColumnNullability",
        "fieldName": [ "existing_column" ],
        "nullable": true
      }

    UpdateTableColumnDefaultValueRequest:
      type: object
      required:
        - "@type"
        - fieldName
        - newDefaultValue
      properties:
        "@type":
          type: string
          enum:
            - "updateColumnDefaultValue"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to update
        newDefaultValue:
          $ref: "#/components/schemas/ColumnDefaultValue"
          description: The new default value of the column 
      example: {
        "@type": "updateColumnDefaultValue",
        "fieldName": [ "existing_column" ],
        "newDefaultValue": { "type": "literal", "dataType": "varchar(100)", "value": "new default value" }
      }

    DeleteTableColumnRequest:
      type: object
      required:
        - "@type"
        - fieldName
      properties:
        "@type":
          type: string
          enum:
            - "deleteColumn"
        fieldName:
          $ref: "#/components/schemas/FieldName"
          description: The name of the column to delete
        ifExists:
          type: boolean
          description: If true, the request will not fail if the column does not exist
          nullable: true
          default: false
      example: {
        "@type": "deleteColumn",
        "fieldName": [ "no_existing_column" ],
        "ifExists": true
      }


    ColumnPosition:
      oneOf:
        - $ref: "#/components/schemas/FirstColumnPosition"
        - $ref: "#/components/schemas/AfterColumnPosition"
        - $ref: "#/components/schemas/DefaultColumnPosition"

    FirstColumnPosition:
      type: string
      enum:
        - "first"

    AfterColumnPosition:
      type: object
      required:
        - after
      properties:
        after:
          type: string
          description: The name of the column which the new column will be added after

    DefaultColumnPosition:
      type: string
      description: |
        The default position of the column to add, the position is determined by the catalog implementation
      enum:
        - "default"



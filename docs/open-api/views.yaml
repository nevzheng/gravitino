---

paths:

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/views:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"

    get:
      tags:
        - view
      summary: List views
      operationId: listViews
      description: |
        Lists live views by default. `include=deleted` returns recoverable metadata-deletion
        records and supports exact `name` and `id` filters. Deleted collection responses do not
        carry an ETag; read an exact deleted view before restoring it. Deleted-view reads are
        temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/viewNameFilter"
        - $ref: "#/components/parameters/viewIdFilter"
      responses:
        "200":
          description: Live view identifiers or deleted metadata records
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/EntityListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted views in the schema
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The target schema does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - view
      summary: Create view
      operationId: createView
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewCreateRequest"
            examples:
              ViewCreateRequest:
                $ref: "#/components/examples/ViewCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/ViewResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target schema does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
        "409":
          description: Conflict - The target view already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                ViewAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/ViewAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/views/{view}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"
      - $ref: "./openapi.yaml#/components/parameters/view"

    get:
      tags:
        - view
      summary: Get view
      operationId: loadView
      description: |
        Returns the specified live view by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact tombstone under the live parent path. The
        deleted representation is metadata-only and carries a strong ETag for PATCH.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedViewId"
      responses:
        "200":
          description: A live view or one exact deleted-view generation
          headers:
            ETag:
              description: Returned only for an exact deleted-view read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/ViewResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted view
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The target view does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchViewException:
                  $ref: "#/components/examples/NoSuchViewException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - view
      summary: Restore a soft-deleted view
      operationId: restoreView
      description: |
        Makes one exact soft-deleted view generation active again. The immutable `id`, path name,
        and strong `If-Match` value bind PATCH to the exact representation returned by GET.

        Restore affects only Gravitino metadata. It does not contact a connector, validate the
        downstream view, or recreate it. The downstream view may be missing or may differ from the
        restored metadata. The same accepted ETag can be replayed only while this generation
        remains latest and the exact view ID is live at its original parent and name.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedViewInclude"
        - $ref: "#/components/parameters/restoreViewId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          $ref: "#/components/responses/ViewResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The token does not identify the requested view ID and name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name or ID is occupied, a newer same-name tombstone exists, the parent
            changed, purge is in progress, or the tombstone predates complete deletion records.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - view
      summary: Update view
      operationId: alterView
      description: Update the specified view in a schema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/ViewResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target view does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchViewException:
                  $ref: "#/components/examples/NoSuchViewException"
        "409":
          description: Conflict - The target view already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                ViewAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/ViewAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - view
      summary: Delete view
      operationId: dropView
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target metalake or catalog does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:

  parameters:
    include:
      name: include
      in: query
      description: Select live views or soft-deleted view records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    viewNameFilter:
      name: name
      in: query
      description: Exact view-name filter
      required: false
      schema:
        type: string

    viewIdFilter:
      name: id
      in: query
      description: Immutable view-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedViewId:
      name: id
      in: query
      description: Immutable view ID required for an exact deleted-view read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreViewId:
      name: id
      in: query
      description: Immutable ID of the soft-deleted view generation to restore
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedViewInclude:
      name: include
      in: query
      description: Selects the exact deleted view targeted by this conditional PATCH
      required: true
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag returned by the exact deleted-view GET
      required: true
      schema:
        type: string

  schemas:
    SQLRepresentation:
      type: object
      required:
        - type
        - dialect
        - sql
      properties:
        type:
          type: string
          enum:
            - "sql"
          description: The representation type discriminator
        dialect:
          type: string
          description: The SQL dialect of this representation
        sql:
          type: string
          description: The SQL text of the view

    Representation:
      oneOf:
        - $ref: "#/components/schemas/SQLRepresentation"
      discriminator:
        propertyName: type
        mapping:
          sql: "#/components/schemas/SQLRepresentation"

    View:
      type: object
      required:
        - name
        - audit
        - columns
        - representations
      properties:
        name:
          type: string
          description: The name of the view
        comment:
          type: string
          description: The comment of the view
          nullable: true
        columns:
          type: array
          description: The output columns of the view
          items:
            $ref: "./tables.yaml#/components/schemas/Column"
        representations:
          type: array
          description: The representations of the view, keyed by dialect
          items:
            $ref: "#/components/schemas/Representation"
        defaultCatalog:
          type: string
          description: The default catalog used to resolve unqualified identifiers in the view representations
          nullable: true
        defaultSchema:
          type: string
          description: The default schema used to resolve unqualified identifiers in the view representations
          nullable: true
        properties:
          type: object
          description: The properties of the view
          nullable: true
          default: {}
          additionalProperties:
            type: string
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"

    ViewCreateRequest:
      type: object
      required:
        - name
        - representations
      properties:
        name:
          type: string
          description: The name of the view
        comment:
          type: string
          description: The comment of the view
          nullable: true
        columns:
          type: array
          description: The output columns of the view
          items:
            $ref: "./tables.yaml#/components/schemas/Column"
        representations:
          type: array
          description: The representations of the view, at least one is required
          minItems: 1
          items:
            $ref: "#/components/schemas/Representation"
        defaultCatalog:
          type: string
          description: The default catalog used to resolve unqualified identifiers in the view representations
          nullable: true
        defaultSchema:
          type: string
          description: The default schema used to resolve unqualified identifiers in the view representations
          nullable: true
        properties:
          type: object
          description: The properties of the view
          nullable: true
          default: {}
          additionalProperties:
            type: string

    ViewUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ViewUpdateRequest"

    ViewUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/RenameViewRequest"
        - $ref: "#/components/schemas/SetViewPropertyRequest"
        - $ref: "#/components/schemas/RemoveViewPropertyRequest"
        - $ref: "#/components/schemas/ReplaceViewRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/schemas/RenameViewRequest"
          setProperty: "#/components/schemas/SetViewPropertyRequest"
          removeProperty: "#/components/schemas/RemoveViewPropertyRequest"
          replaceView: "#/components/schemas/ReplaceViewRequest"

    RenameViewRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - "rename"
        newName:
          type: string
          description: The new name of the view
      example: {
        "@type": "rename",
        "newName": "view2"
      }

    SetViewPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - "setProperty"
        property:
          type: string
          description: The name of the property to set
        value:
          type: string
          description: The value of the property to set
      example: {
        "@type": "setProperty",
        "property": "key",
        "value": "value"
      }

    RemoveViewPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - "removeProperty"
        property:
          type: string
          description: The name of the property to remove
      example: {
        "@type": "removeProperty",
        "property": "key"
      }

    ReplaceViewRequest:
      type: object
      description: |
        Atomically replaces the body of a view. Columns, representations, default catalog, default
        schema and comment are all replaced. The view name and properties are not affected.
      required:
        - "@type"
        - representations
      properties:
        "@type":
          type: string
          enum:
            - "replaceView"
        columns:
          type: array
          description: The new output columns of the view
          items:
            $ref: "./tables.yaml#/components/schemas/Column"
        representations:
          type: array
          description: The new representations of the view, at least one is required
          minItems: 1
          items:
            $ref: "#/components/schemas/Representation"
        defaultCatalog:
          type: string
          description: The new default catalog, or null to unset it
          nullable: true
        defaultSchema:
          type: string
          description: The new default schema, or null to unset it
          nullable: true
        comment:
          type: string
          description: The new comment, or null to unset it
          nullable: true
      example: {
        "@type": "replaceView",
        "columns": [],
        "representations": [
          {
            "type": "sql",
            "dialect": "trino",
            "sql": "SELECT 2"
          }
        ],
        "defaultCatalog": "cat1",
        "defaultSchema": "sch1",
        "comment": "new comment"
      }

  responses:
    ViewResponse:
      description: Returns include the view object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              view:
                $ref: "#/components/schemas/View"
          examples:
            ViewResponse:
              $ref: "#/components/examples/ViewResponse"

  examples:
    ViewCreateRequest:
      value: {
        "name": "view1",
        "comment": "This is a view",
        "columns": [
          {
            "name": "id",
            "type": "long",
            "comment": "id column",
            "nullable": true
          }
        ],
        "representations": [
          {
            "type": "sql",
            "dialect": "trino",
            "sql": "SELECT id FROM t"
          }
        ],
        "properties": {
          "key": "value"
        }
      }

    ViewResponse:
      value: {
        "code": 0,
        "view": {
          "name": "view1",
          "comment": "This is a view",
          "audit": {
            "creator": "gravitino",
            "createTime": "2024-01-01T00:00:00Z",
            "lastModifier": "gravitino",
            "lastModifiedTime": "2024-01-01T00:00:00Z"
          },
          "columns": [
            {
              "name": "id",
              "type": "long",
              "comment": "id column",
              "nullable": true
            }
          ],
          "representations": [
            {
              "type": "sql",
              "dialect": "trino",
              "sql": "SELECT id FROM t"
            }
          ],
          "properties": {
            "key": "value"
          }
        }
      }

    ViewAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "ViewAlreadyExistsException",
        "message": "Failed to operate view(s) [view1] operation [CREATE] under schema [test_schema], reason [ViewAlreadyExistsException]",
        "stack": [
          "org.apache.gravitino.exceptions.ViewAlreadyExistsException: View already exists: view1",
          "..."
        ]
      }

    NoSuchViewException:
      value: {
        "code": 1003,
        "type": "NoSuchViewException",
        "message": "Failed to operate view(s) [test_view] operation [LOAD] under schema [test_schema], reason [NoSuchViewException]",
        "stack": [
          "org.apache.gravitino.exceptions.NoSuchViewException: View test_view does not exist",
          "..."
        ]
      }

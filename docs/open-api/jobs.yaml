---

paths:

  /metalakes/{metalake}/jobs/templates:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - job
      summary: List job templates (names)
      operationId: listJobTemplates
      description: |
        Returns live job templates in the specified metalake by default. The exact `name` filter
        applies to live and deleted results. With `include=deleted`, returns independently deleted
        job-template metadata generations and additionally supports the immutable `id` filter.
        `details=true` is not supported with `include=deleted`.
        Deleted-template discovery is metadata-only and temporarily restricted to service
        administrators. Job runs are children of their template deletion generation and have no
        independent recovery route.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/jobTemplateNameFilter"
        - $ref: "#/components/parameters/jobTemplateIdFilter"
      responses:
        "200":
          description: Returns the list of job template objects if {details} is true, otherwise returns the list of job template names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "#/components/responses/JobTemplateListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
                JobTemplateListResponse:
                  $ref: "#/components/examples/JobTemplateListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect deleted job templates
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - job
      summary: Register a job template
      operationId: registerJobTemplate
      description: Registers a job template in the specified metalake
      requestBody:
        content:
          application/vnd.gravitino.v1+json:
            schema:
              $ref: "#/components/requests/JobTemplateRegisterRequest"
            examples:
              JobTemplateRegisterRequest:
                $ref: "#/components/examples/JobTemplateRegisterRequest"

      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/BaseResponse"
        "409":
          description: Conflict - The target job template already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                JobTemplateAlreadyExistsException:
                  $ref: "#/components/examples/JobTemplateAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/jobs/templates/{jobTemplate}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "#/components/parameters/jobTemplate"

    get:
      tags:
        - job
      summary: Get job template
      operationId: getJobTemplate
      description: |
        Returns the specified live job template by default. With `include=deleted`, `id` is
        required and the path name plus immutable ID select one exact tombstone under the live
        metalake. The deleted representation is metadata-only, carries a strong ETag for
        conditional PATCH, and is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedJobTemplateId"
      responses:
        "200":
          description: A live job template or one exact deleted-template generation
          headers:
            ETag:
              description: Returned only for an exact deleted-job-template read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/JobTemplateResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
              examples:
                JobTemplateResponse:
                  $ref: "#/components/examples/JobTemplateResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted job template
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified job template does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchJobTemplateException:
                  $ref: "#/components/examples/NoSuchJobTemplateException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - job
      summary: Restore job-template metadata
      operationId: restoreJobTemplate
      description: |
        Makes one exact soft-deleted job-template metadata generation active again.
        `include=deleted`, immutable `id`, path name, and strong `If-Match` bind PATCH to the exact
        representation returned by GET. Only the latest same-name generation is eligible, and
        restore is temporarily restricted to service administrators.

        Restore is metadata-only. The aggregate consists of the job-template root and terminal job
        runs that were live and captured when the template was deleted. Runs are restored before
        the template root and are never independent recovery targets. Finished runs tombstoned
        earlier by autonomous cleanup have no template deletion token and are neither adopted nor
        restored. The transaction verifies the exact affected-row count; a missing or mismatched
        captured row requires manual metadata repair. A live run occupying a captured
        `job_execution_id` fails with `EXTERNAL_ID_OCCUPIED`.

        PATCH does not contact an executor, resubmit, poll, or cancel a job, recreate staging
        files, or replay external authorization. Ownership, grants, and job metrics are outside the
        standalone aggregate. Existing deletion continues to reject a template with active jobs.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedJobTemplateInclude"
        - $ref: "#/components/parameters/restoreJobTemplateId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: Returns the restored job-template metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobTemplateResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot restore deleted job templates
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The exact template tombstone or replay receipt does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name, ID, or captured job execution ID is occupied; a newer same-name
            tombstone exists; the metalake changed; purge is in progress; the generation is
            incomplete; or the tombstone predates complete deletion records. Incomplete
            generations require manual metadata repair.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - job
      summary: Delete job template
      operationId: deleteJobTemplate
      description: |
        Deletes the job-template metadata and its terminal job-run metadata. The request is still
        rejected when any associated job is active.
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - job
      summary: Update job template
      operationId: updateJobTemplate
      description: Updates a job template in the specified metalake
      requestBody:
        content:
          application/vnd.gravitino.v1+json:
            schema:
              $ref: "#/components/requests/JobTemplateUpdatesRequest"
            examples:
              JobTemplateRegisterRequest:
                $ref: "#/components/examples/JobTemplateUpdatesRequest"

      responses:
        "200":
          description: Returns the updated job template object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobTemplateResponse"
              examples:
                JobTemplateResponse:
                  $ref: "#/components/examples/JobTemplateResponse"
        "404":
          description: Not Found - The specified job template does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchJobTemplateException:
                  $ref: "#/components/examples/NoSuchJobTemplateException"
        "400":
          description: Bad Request - The changes in the request cannot be applied to the job template
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                IllegalArgumentException:
                  $ref: "#/components/examples/IllegalArgumentException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/jobs/runs:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - job
      summary: List jobs
      operationId: listJobs
      parameters:
        - $ref: "#/components/parameters/jobTemplateName"
      responses:
        "200":
          description: Returns the list of job objects
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobListResponse"
              examples:
                JobListResponse:
                  $ref: "#/components/examples/JobListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - job
      summary: run a job
      operationId: runJob
      description: Runs a job based on the specified job template in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/requests/JobRunRequest"
            examples:
              JobRunRequest:
                $ref: "#/components/examples/JobRunRequest"

      responses:
        "200":
          description: Returns the empty response with status code 0
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobResponse"
        "404":
          description: Not Found - The specified job template does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                JobTemplateAlreadyExistsException:
                  $ref: "#/components/examples/NoSuchJobTemplateException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/jobs/runs/{jobId}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "#/components/parameters/jobId"

    get:
      tags:
        - job
      summary: Get job
      operationId: getJob
      description: Returns the specified job information in the specified metalake
      responses:
        "200":
          description: Returns the job object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobResponse"
              examples:
                JobResponse:
                  $ref: "#/components/examples/JobResponse"
        "404":
          description: Not Found - The specified job does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchJobException:
                  $ref: "#/components/examples/NoSuchJobException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - job
      summary: Cancel job
      operationId: cancelJob
      description: Cancels the specified job in the specified metalake
      responses:
        "200":
          description: Returns the job object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/JobResponse"
              examples:
                JobResponse:
                  $ref: "#/components/examples/JobResponse"
        "404":
          description: Not Found - The specified job does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchJobException:
                  $ref: "#/components/examples/NoSuchJobException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the job template
      required: false
      schema:
        type: boolean
        default: false
    include:
      name: include
      in: query
      description: Select live job templates or soft-deleted job-template recovery records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted
    jobTemplateNameFilter:
      name: name
      in: query
      description: Exact job-template-name filter for live or deleted results
      required: false
      schema:
        type: string
    jobTemplateIdFilter:
      name: id
      in: query
      description: Immutable job-template-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
    deletedJobTemplateId:
      name: id
      in: query
      description: Immutable job-template ID required for an exact deleted-template read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
    restoreDeletedJobTemplateInclude:
      name: include
      in: query
      description: Required as `deleted` when PATCH restores a deleted job template
      required: true
      schema:
        type: string
        enum:
          - deleted
    restoreJobTemplateId:
      name: id
      in: query
      description: Immutable job-template ID required when PATCH restores a deleted job template
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag required when PATCH restores a deleted job template
      required: true
      schema:
        type: string
    jobTemplate:
      name: jobTemplate
      in: path
      description: The name of the job template
      required: true
      schema:
        type: string
    jobTemplateName:
      name: jobTemplateName
      in: query
      description: list the jobs by the job template name
      required: false
      schema:
        type: string
        default: ""
    jobId:
      name: jobId
      in: path
      description: The unique identifier of the job
      required: true
      schema:
        type: string

  schemas:

    JobTemplate:
      oneOf:
        - $ref: "#/components/schemas/ShellJobTemplate"
        - $ref: "#/components/schemas/SparkJobTemplate"
      discriminator:
        propertyName: jobType
        mapping:
          shell: "#/components/schemas/ShellJobTemplate"
          spark: "#/components/schemas/SparkJobTemplate"

    ShellJobTemplate:
      type: object
      description: A job template object for shell jobs
      required:
        - name
        - jobType
        - executable
      properties:
        name:
          type: string
          description: The name of the job template
        jobType:
          type: string
          description: The type of the job template
          enum:
            - "shell"
        comment:
          type: string
          description: A comment about the job template
          nullable: true
        executable:
          type: string
          description: The executable command of the job template
        arguments:
          type: array
          description: The arguments of the job template
          items:
            type: string
          nullable: true
        environments:
          type: object
          description: Configured string to string map of environment variables for the job template
          default: { }
          additionalProperties:
            type: string
        customFields:
          type: object
          description: Configured string to string map of custom fields for the job template
          default: { }
          additionalProperties:
            type: string
        scripts:
            type: array
            description: The scripts of the job template
            items:
                type: string
            nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"

    SparkJobTemplate:
      type: object
      description: A job template object for Spark jobs
      required:
        - name
        - jobType
        - executable
      properties:
        name:
          type: string
          description: The name of the job template
        jobType:
          type: string
          description: The type of the job template
          enum:
            - "spark"
        comment:
          type: string
          description: A comment about the job template
          nullable: true
        executable:
          type: string
          description: The executable command of the job template
        arguments:
          type: array
          description: The arguments of the job template
          items:
            type: string
          nullable: true
        environments:
          type: object
          description: Configured string to string map of environment variables for the job template
          default: { }
          additionalProperties:
            type: string
        customFields:
          type: object
          description: Configured string to string map of custom fields for the job template
          default: { }
          additionalProperties:
            type: string
        className:
          type: string
          description: The main class of the Spark job template. Required for Java/Scala Spark applications, optional for PySpark applications
          nullable: true
        jars:
          type: array
          description: The JAR files of the Spark job template
          items:
            type: string
          nullable: true
        files:
          type: array
          description: The files of the Spark job template
          items:
            type: string
          nullable: true
        archives:
          type: array
          description: The archives of the Spark job template
          items:
            type: string
          nullable: true
        configs:
          type: object
          description: Configured string to string map of Spark configurations for the job template
          default: { }
          additionalProperties:
            type: string
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"

    Job:
      type: object
      description: A job object
      required:
        - jobId
        - jobTemplateName
        - status
        - audit
      properties:
        jobId:
          type: string
          description: The unique identifier of the job
        jobTemplateName:
          type: string
          description: The name of the job template used to create the job
        status:
          type: string
          description: The status of the job
          enum:
            - "queued"
            - "started"
            - "failed"
            - "succeeded"
            - "cancelling"
            - "canceled"
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"


    TemplateUpdate:
      oneOf:
        - $ref: "#/components/schemas/ShellTemplateUpdate"
        - $ref: "#/components/schemas/SparkTemplateUpdate"
      discriminator:
        propertyName: "@type"
        mapping:
          shell: "#/components/schemas/ShellTemplateUpdate"
          spark: "#/components/schemas/SparkTemplateUpdate"

    ShellTemplateUpdate:
      type: object
      description: A job template update object for shell jobs
      required:
        - "@type"
      properties:
        "@type":
          type: string
          description: The type of the job template
          enum:
            - "shell"
        newExecutable:
          type: string
          description: The new executable command of the job template
          nullable: true
        newArguments:
          type: array
          description: The new arguments of the job template
          items:
            type: string
          nullable: true
        newEnvironments:
          type: object
          description: The new configured string to string map of environment variables for the job template
          additionalProperties:
            type: string
          nullable: true
        newCustomFields:
          type: object
          description: The new configured string to string map of custom fields for the job template
          additionalProperties:
            type: string
          nullable: true
        newScripts:
          type: array
          description: The new scripts of the job template
          items:
            type: string
          nullable: true

    SparkTemplateUpdate:
      type: object
      description: A job template update object for Spark jobs
      required:
        - "@type"
      properties:
        "@type":
          type: string
          description: The type of the job template
          enum:
            - "spark"
        newExecutable:
          type: string
          description: The new executable command of the job template
          nullable: true
        newArguments:
          type: array
          description: The new arguments of the job template
          items:
            type: string
          nullable: true
        newEnvironments:
          type: object
          description: The new configured string to string map of environment variables for the job template
          additionalProperties:
            type: string
          nullable: true
        newCustomFields:
          type: object
          description: The new configured string to string map of custom fields for the job template
          additionalProperties:
            type: string
          nullable: true
        newClassName:
          type: string
          description: The new class name of the Spark job template. Required for Java/Scala Spark applications, optional for PySpark applications
          nullable: true
        newJars:
          type: array
          description: The new JAR files of the Spark job template
          items:
            type: string
          nullable: true
        newFiles:
          type: array
          description: The new files of the Spark job template
          items:
            type: string
          nullable: true
        newArchives:
          type: array
          description: The new archives of the Spark job template
          items:
            type: string
          nullable: true
        newConfigs:
          type: object
          description: The new configured string to string map of Spark configurations for the job template
          additionalProperties:
            type: string
          nullable: true

  requests:

    JobTemplateRegisterRequest:
      type: object
      required:
        - jobTemplate
      properties:
        jobTemplate:
          $ref: "#/components/schemas/JobTemplate"

    JobTemplateUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/requests/JobTemplateUpdateRequest"

    JobTemplateUpdateRequest:
      oneOf:
        - $ref: "#/components/requests/RenameJobTemplateRequest"
        - $ref: "#/components/requests/UpdateJobTemplateCommentRequest"
        - $ref: "#/components/requests/UpdateJobTemplateContentRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/requests/RenameJobTemplateRequest"
          updateComment: "#/components/requests/UpdateJobTemplateCommentRequest"
          updateTemplate: "#/components/requests/UpdateJobTemplateContentRequest"

    RenameJobTemplateRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - "rename"
        newName:
          type: string
          description: The new name of the job template

    UpdateJobTemplateCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - "updateComment"
        newComment:
          type: string
          description: The new comment of the job template


---

paths:

  /metalakes/{metalake}/users:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"

    get:
      tags:
        - access control
      summary: List users (names)
      operationId: listUsers
      description: |
        Returns live users by default. With `include=deleted`, returns independently deleted user
        metadata generations under the live metalake, optionally filtered by exact name or
        immutable ID. `details=true` is not supported with `include=deleted`. Deleted-user
        discovery is metadata-only and temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/userNameFilter"
        - $ref: "#/components/parameters/userIdFilter"
      responses:
        "200":
          description: Returns live user names/details or deleted-user recovery records
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/UserListResponse"
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                UserListResponse:
                  $ref: "#/components/examples/UserListResponse"
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect deleted users
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"

        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - access control
      summary: Add user
      operationId: addUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAddRequest"
            examples:
              UserAddRequest:
                $ref: "#/components/examples/UserAddRequest"

      responses:
        "200":
          description: Returns the added user object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/UserResponse"
              examples:
                UserResponse:
                  $ref: "#/components/examples/UserResponse"
        "409":
          description: Conflict - The target user already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                UserAlreadyExistsException:
                  $ref: "#/components/examples/UserAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/users/{user}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/user"

    get:
      tags:
        - access control
      summary: Get user
      operationId: getUser
      description: |
        Returns the specified live user by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact tombstone under the live metalake. The
        deleted representation is metadata-only, carries a strong ETag for conditional PATCH, and
        is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedUserId"
      responses:
        "200":
          description: A live user or one exact deleted-user generation
          headers:
            ETag:
              description: Returned only for an exact deleted-user read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/UserResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
              examples:
                UserResponse:
                  $ref: "#/components/examples/UserResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted user
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified user does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchUserException:
                  $ref: "#/components/examples/NoSuchUserException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - access control
      summary: Restore user metadata
      operationId: restoreUser
      description: |
        Makes one exact soft-deleted user metadata generation active again. `include=deleted`, the
        immutable `id`, path name, and strong `If-Match` bind PATCH to the exact representation
        returned by GET. Only the latest same-name generation is eligible.

        Restore is metadata-only. It restores the user root, its captured role memberships, and
        captured ownership rows where the user is the owning principal. It does not inspect or
        change an identity provider or other upstream identity source, and does not replay Ranger
        or another external authorization system. A missing captured row requires manual repair.
        Restore is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedUserInclude"
        - $ref: "#/components/parameters/restoreUserId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: Returns the restored user metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/UserResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot restore deleted users
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The exact user tombstone or replay receipt does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name or ID is occupied, the external ID is held by another live user
            (`EXTERNAL_ID_OCCUPIED`), a newer same-name tombstone exists, the metalake changed,
            purge is in progress, the generation is incomplete, or the tombstone predates complete
            deletion records. Incomplete generations and occupied external IDs require deliberate
            metadata repair or conflict resolution before retry.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - access control
      summary: Remove user
      operationId: removeUser
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/RemoveResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the user
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live users or soft-deleted user recovery records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    userNameFilter:
      name: name
      in: query
      description: Exact user-name filter
      required: false
      schema:
        type: string

    userIdFilter:
      name: id
      in: query
      description: Immutable user-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedUserId:
      name: id
      in: query
      description: Immutable user ID required for an exact deleted-user read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedUserInclude:
      name: include
      in: query
      description: Required as `deleted` when PATCH restores a deleted user
      required: true
      schema:
        type: string
        enum:
          - deleted

    restoreUserId:
      name: id
      in: query
      description: Immutable user ID required when PATCH restores a deleted user
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag required when PATCH restores a deleted user
      required: true
      schema:
        type: string

  schemas:
    User:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the user
        externalId:
          type: string
          description: The external identifier of the user
        enabled:
          type: boolean
          description: Whether the user is enabled
          default: true
        roles:
          type: array
          items:
            type: string
          description: The roles of the user
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"

    UserAddRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the user
        externalId:
          type: string
          description: The external identifier of the user
        enabled:
          type: boolean
          description: Whether the user is enabled
          default: true

  responses:
    UserResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        user:
          $ref: "#/components/schemas/User"

    UserListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        users:
          type: array
          description: A list of user objects
          items:
            $ref: "#/components/schemas/User"

  examples:
    UserAddRequest:
      value: {
        "name": "user",
        "externalId": "ext-user",
        "enabled": true
      }

    NameListResponse:
      value: {
        "code": 0,
        "names": [ "user1", "user2" ]
      }

    UserResponse:
      value: {
        "code": 0,
        "user": {
          "name": "user1",
          "roles": [],
          "audit": {
            "creator": "gravitino",
            "createTime": "2023-12-08T06:41:25.595Z"
          },
        }
      }

    UserListResponse:
      value: {
        "code": 0,
        "users": [ {
          "name": "user1",
          "roles": [ ],
          "audit": {
            "creator": "gravitino",
            "createTime": "2023-12-08T06:41:25.595Z"
          },
        } ]
      }

    UserAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "UserAlreadyExistsException",
        "message": "User already exists",
        "stack": [
          "org.apache.gravitino.exceptions.UserAlreadyExistsException: User already exists: user1"
        ]
      }

    NoSuchUserException:
      value: {
        "code": 1003,
        "type": "NoSuchUserException",
        "message": "User does not exist",
        "stack": [
          "org.apache.gravitino.exceptions.NoSuchUserException: User does not exist",
          "..."
        ]
      }

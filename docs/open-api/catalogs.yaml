---

paths:

  /metalakes/{metalake}/catalogs:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - catalog
      summary: List catalogs (names)
      operationId: listCatalogs
      description: |
        Lists live catalogs by default. `include=deleted` lists independently recorded catalog
        deletion generations in this metalake without initializing or contacting any catalog
        connector. Optional `name` and `id` filters are exact and compose; an immutable ID selects
        at most one current tombstone. Read one exact deleted catalog from the item URI before
        restoring it because a collection has no single ETag. Deleted-catalog discovery is
        temporarily restricted to service administrators.

        `details=true` is supported only for live catalogs and is rejected with
        `include=deleted`.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/catalogNameFilter"
        - $ref: "#/components/parameters/catalogIdFilter"
      responses:
        "200":
          description: Live catalog identifiers/details or deleted catalog metadata records
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CatalogListResponse"
                  - $ref: "#/components/schemas/CatalogInfoListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                CatalogListResponse:
                  $ref: "#/components/examples/CatalogListResponse"
                CatalogInfoListResponse:
                  $ref: "#/components/examples/CatalogInfoListResponse"
                DeletedEntityListResponse:
                  $ref: "./tables.yaml#/components/examples/DeletedEntityListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted catalogs in this metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - catalog
      summary: Create catalog
      operationId: createCatalog
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogCreateRequest"
            examples:
              CatalogCreate:
                $ref: "#/components/examples/CatalogCreate"
              CatalogCreateIcebergStorageBackend:
                $ref: "#/components/examples/CatalogCreateIcebergStorageBackend"
              CatalogCreateIcebergRestBackend:
                $ref: "#/components/examples/CatalogCreateIcebergRestBackend"

      responses:
        "200":
          $ref: "#/components/responses/CatalogResponse"
        "409":
          description: Conflict - The target catalog already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                CatalogAlreadyExistsException:
                  $ref: "#/components/examples/CatalogAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/testConnection:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    post:
      tags:
        - catalog
      summary: Test catalog connection
      operationId: testConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogCreateRequest"
            examples:
              CatalogCreate:
                $ref: "#/components/examples/CatalogCreate"
              CatalogCreateIcebergStorageBackend:
                $ref: "#/components/examples/CatalogCreateIcebergStorageBackend"
              CatalogCreateIcebergRestBackend:
                $ref: "#/components/examples/CatalogCreateIcebergRestBackend"
      responses:
        "200":
          description: Test connection completed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                type: object
                required:
                  - code
                properties:
                  code:
                      type: integer
                      format: int32
                      description: Status code of the response
                  type:
                    type: string
                    description: Internal type definition of the exception
                  message:
                    type: string
                    description: The message of the exception
                  stack:
                    type: array
                    items:
                      type: string
                      description: The stack trace of the exception
              examples:
                TestConnectionSuccess:
                  value: {
                    "code": 0
                  }
                TestConnectionFailed:
                  $ref: "#/components/examples/ConnectionFailedException"
                CatalogAlreadyExists:
                  $ref: "#/components/examples/CatalogAlreadyExistsException"
                MetalakeNotFound:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



  /metalakes/{metalake}/catalogs/{catalog}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"

    get:
      tags:
        - catalog
      summary: Get catalog
      operationId: loadCatalog
      description: |
        Returns the specified live catalog by default. With `include=deleted`, `id` is required and
        the item name plus immutable ID select one exact catalog-root tombstone in this metalake.
        A successful deleted read returns the restore token in both the body's `etag` field and a
        strong HTTP `ETag` header. The deleted read is metadata-only, does not initialize a catalog
        connector, and is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedCatalogId"
      responses:
        "200":
          description: A live catalog or one exact deleted catalog metadata generation
          headers:
            ETag:
              description: Returned only for an exact deleted-catalog read and used by conditional PATCH
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/CatalogResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          description: |
            Bad Request - `include` is unsupported, `include=deleted` is missing `id`, the ID is
            invalid, or `id` is supplied for a live read.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller cannot inspect this deleted catalog
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: |
            Not Found - The live catalog does not exist, or the deleted ID and name do not identify
            one catalog tombstone in this metalake.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - catalog
      summary: Update catalog
      operationId: alterCatalog
      description: Alters the specified catalog information in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/CatalogResponse"
        "404":
          description: Not Found - The specified catalog does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "409":
            description: Conflict - The target catalog already exists in the specified metalake
            content:
              application/vnd.gravitino.v1+json:
                schema:
                  $ref: "./openapi.yaml#/components/schemas/ErrorModel"
                examples:
                  CatalogAlreadyExistsException:
                    $ref: "#/components/examples/CatalogAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - catalog
      summary: Set catalog in-use or restore soft-deleted catalog metadata
      operationId: setCatalog
      description: |
        With `application/json`, preserves the existing operation that enables or disables a live
        catalog.

        With `application/merge-patch+json`, makes one exact soft-deleted Gravitino catalog metadata
        generation active again. `include=deleted`, immutable `id`, and a strong `If-Match` value
        bind the request to the exact representation returned by GET. Only the most recent
        tombstone for that name can be restored. When the original catalog deletion cascaded, the
        same transaction restores the exact Gravitino metadata tree recorded by that deletion. If
        any member cannot be restored, the transaction rolls back without a partial tree.

        Restore is metadata-only. It does not initialize or call the catalog connector, validate or
        recreate downstream schemas or objects, resolve provider defaults, or reconcile downstream
        state. To avoid exposing raw stored connector credentials, the immediate restore response
        returns an empty `properties` map. A later normal GET returns the catalog's usual
        connector-filtered and resolved property view. Replaying the same accepted ETag is
        idempotent only while the same immutable catalog ID is live at its original path and that
        deletion generation remains the latest one for the name. A stale precondition requires an
        exact re-read; clients must not silently switch to a newer deletion generation. Restore is
        temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedCatalogInclude"
        - $ref: "#/components/parameters/restoreCatalogId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSetRequest"
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: Catalog in-use state was set, or the selected catalog metadata was restored
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/responses/BaseResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "#/components/responses/CatalogResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
        "400":
          description: |
            Bad Request - The live set request is malformed; or, for restore,
            `include=deleted` is missing, the ID is invalid, the patch is malformed, or `deleted`
            is absent or not exactly `false`.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller cannot perform the selected operation
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: |
            Not Found - The live catalog/metalake does not exist, or the restore ID and name do not
            identify one deleted catalog.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "409":
          description: |
            Conflict - The name or ID is occupied, a newer same-name tombstone exists, the original
            metalake is missing or replaced, purge is in progress, the deletion record is
            incomplete, or one member of a cascade-deleted metadata tree cannot be restored. No
            partial tree is committed; repair the conflict before retrying.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected catalog tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: |
            Unsupported Media Type - PATCH accepts application/json for set-in-use or
            application/merge-patch+json for metadata restore.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing from a restore request
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



    delete:
      tags:
        - catalog
      summary: Drop catalog
      operationId: dropCatalog
      parameters:
        - $ref: "./openapi.yaml#/components/parameters/force"
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the catalogs
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live catalogs or soft-deleted catalog metadata records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    catalogNameFilter:
      name: name
      in: query
      description: |
        Exact catalog-name filter. More than one deletion generation can have the same name. For a
        deleted listing, `name` and `id` must both match when supplied together.
      required: false
      schema:
        type: string

    catalogIdFilter:
      name: id
      in: query
      description: |
        Immutable catalog-ID filter selecting one exact deletion record. This filter is supported
        only with `include=deleted`.
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedCatalogId:
      name: id
      in: query
      description: |
        Immutable catalog ID. This parameter is required with `include=deleted` and rejected for a
        normal live-catalog read.
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreCatalogId:
      name: id
      in: query
      description: |
        Immutable ID of the soft-deleted catalog metadata generation to restore. Required for an
        `application/merge-patch+json` request and omitted for the existing set-in-use request.
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedCatalogInclude:
      name: include
      in: query
      description: |
        Selects the exact deleted catalog metadata targeted by a conditional merge PATCH. Required
        with `application/merge-patch+json` and omitted for the existing set-in-use request.
      required: false
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: |
        Strong HTTP entity tag returned by an exact catalog GET with `include=deleted&id=...`.
        Required for an `application/merge-patch+json` restore. Wildcards, weak tags, and lists of
        tags are rejected. Omit this header for the existing set-in-use request.
      required: false
      schema:
        type: string

  schemas:

    Catalog:
      type: object
      description: A catalog
      required:
        - name
        - type
        - provider
        - audit
      properties:
        name:
          type: string
          description: The name of the catalog
        type:
          type: string
          description: The type of the catalog
          enum:
            - relational
            - fileset
            - messaging
            - model
        provider:
          type: string
          description: The provider of the catalog
          enum:
            - hive
            - lakehouse-iceberg
            - lakehouse-paimon
            - lakehouse-hudi
            - jdbc-mysql
            - jdbc-postgresql
            - jdbc-doris
            - fileset
            - kafka
            - model
        comment:
          type: string
          description: A comment about the catalog
          nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        properties:
          type: object
          description: Configured string to string map of properties for the catalog
          default: { }
          additionalProperties:
            type: string

    CatalogListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        identifiers:
          type: array
          items:
            $ref: "./openapi.yaml#/components/schemas/NameIdentifier"

    CatalogInfoListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        catalogs:
          type: array
          description: A list of catalog objects
          items:
            $ref: "#/components/schemas/Catalog"

    CatalogCreateRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the catalog
        type:
          type: string
          description: The type of the catalog
          enum:
            - relational
            - fileset
            - messaging
            - model
        provider:
          type: string
          description: The provider of the catalog (provider is not required for fileset and model catalog)
          enum:
            - hive
            - lakehouse-iceberg
            - lakehouse-paimon
            - lakehouse-hudi
            - jdbc-mysql
            - jdbc-postgresql
            - jdbc-doris
            - jdbc-oceanbase
            - kafka
        comment:
          type: string
          description: A comment for the catalog
          nullable: true
        properties:
          type: object
          description: A map of properties for the catalog
          nullable: true
          default: { }
          additionalProperties:
            type: string

    CatalogSetRequest:
      type: object
      required:
        - inUse
      properties:
        inUse:
          type: boolean
          description: The in-use status of the catalog to set
      example: {
        "inUse": true
      }

    CatalogUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/CatalogUpdateRequest"

    CatalogUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/RenameCatalogRequest"
        - $ref: "#/components/schemas/UpdateCatalogCommentRequest"
        - $ref: "#/components/schemas/SetCatalogPropertyRequest"
        - $ref: "#/components/schemas/RemoveCatalogPropertyRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/schemas/RenameCatalogRequest"
          updateComment: "#/components/schemas/UpdateCatalogCommentRequest"
          setProperty: "#/components/schemas/SetCatalogPropertyRequest"
          removeProperty: "#/components/schemas/RemoveCatalogPropertyRequest"

    RenameCatalogRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the catalog
      example: {
        "@type": "rename",
        "newName": "my_catalog_new"
      }

    UpdateCatalogCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the catalog
      example: {
        "@type": "updateComment",
        "newComment": "This is my new catalog comment"
      }

    SetCatalogPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The property to set
        value:
          type: string
          description: The value to set
      example: {
        "@type": "setProperty",
        "property": "key1",
        "value": "value1"
      }

    RemoveCatalogPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The property to remove
      example: {
        "@type": "removeProperty",
        "property": "key2"
      }


  responses:

    CatalogResponse:
      description: Returns included catalog object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              catalog:
                $ref: "#/components/schemas/Catalog"
          examples:
            CatalogResponse:
              $ref: "#/components/examples/CatalogResponse"


  examples:
    CatalogListResponse:
      value: {
        "code": 0,
        "identifiers": [
          {
            "namespace": [
              "my_metalake"
            ],
            "name": "my_hive_catalog"
          }
        ]
      }

    CatalogInfoListResponse:
      value: {
        "code": 0,
        "catalogs": [
          {
            "name": "my_hive_catalog",
            "type": "relational",
            "provider": "hive",
            "comment": "This is my hive catalog",
            "properties": {
              "key1": "value1",
              "gravitino.bypass.hive.metastore.client.capability.check": "false",
              "metastore.uris": "thrift://127.0.0.1:9083"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T03:41:25.595Z"
            }
          },
          {
            "name": "my_hadoop_catalog",
            "type": "fileset",
            "provider": "fileset",
            "comment": "This is my hadoop catalog",
            "properties": {
              "key2": "value2"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T06:41:25.595Z"
            }
          }
        ]
      }

    CatalogCreate:
      value: {
        "name": "my_hive_catalog",
        "type": "relational",
        "provider": "hive",
        "comment": "This is my hive catalog",
        "properties": {
          "metastore.uris": "thrift://127.0.0.1:9083",
          "key1": "value1"
        }
      }

    # Iceberg with a storage backend (hive/jdbc): `warehouse` is a physical storage LOCATION.
    CatalogCreateIcebergStorageBackend:
      summary: "Iceberg catalog (hive/jdbc backend): warehouse is a storage location"
      description: >-
        For the `lakehouse-iceberg` provider with `catalog-backend` set to `hive` or `jdbc`,
        the `warehouse` property is a physical storage location (e.g. `s3a://bucket/path` or
        `hdfs://ns/path`) and is required.
      value: {
        "name": "my_iceberg_catalog",
        "type": "relational",
        "provider": "lakehouse-iceberg",
        "comment": "Iceberg catalog backed by a Hive metastore",
        "properties": {
          "catalog-backend": "hive",
          "uri": "thrift://127.0.0.1:9083",
          "warehouse": "s3a://my-bucket/warehouse"
        }
      }

    # Iceberg with the REST backend: `warehouse` is a CATALOG SELECTOR, not a storage location.
    CatalogCreateIcebergRestBackend:
      summary: "Iceberg catalog (REST backend): warehouse selects a catalog, or omit for the default"
      description: >-
        For the `lakehouse-iceberg` provider with `catalog-backend` set to `rest`, the
        `warehouse` property is NOT a storage location. It is forwarded to the Iceberg REST
        server (`GET /v1/config?warehouse=...`) as a catalog selector: a catalog name for
        Gravitino's Iceberg REST server (omit it to use the default catalog), or a
        server-defined identifier such as an Amazon S3 Tables bucket ARN. A storage URI like
        `s3://...` here is a common mistake copied from hive/jdbc examples and will fail to
        resolve.
      value: {
        "name": "my_iceberg_rest_catalog",
        "type": "relational",
        "provider": "lakehouse-iceberg",
        "comment": "Iceberg catalog backed by a remote Iceberg REST server",
        "properties": {
          "catalog-backend": "rest",
          "uri": "http://127.0.0.1:9001/iceberg"
        }
      }

    CatalogResponse:
      value: {
        "code": 0,
        "catalog": {
          "name": "my_hive_catalog",
          "type": "relational",
          "provider": "hive",
          "comment": "This is my hive catalog",

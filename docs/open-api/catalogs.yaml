---

paths:

  /metalakes/{metalake}/catalogs:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - catalog
      summary: List catalogs (names)
      operationId: listCatalogs
      description: |
        Lists live catalogs by default. `include=deleted` returns independently deleted catalog
        trees as retained metadata-deletion records. A cascaded catalog restore revives the exact
        recorded Gravitino metadata tree; it never contacts a catalog connector or downstream
        system. An exact deleted item read is required before a conditional restore PATCH.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/catalogNameFilter"
        - $ref: "#/components/parameters/catalogIdFilter"
      responses:
        "200":
          description: Live catalog identifiers or details, or retained deleted catalog trees
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CatalogListResponse"
                  - $ref: "#/components/schemas/CatalogInfoListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                CatalogListResponse:
                  $ref: "#/components/examples/CatalogListResponse"
                CatalogInfoListResponse:
                  $ref: "#/components/examples/CatalogInfoListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted catalogs
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - catalog
      summary: Create catalog
      operationId: createCatalog
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogCreateRequest"
            examples:
              CatalogCreate:
                $ref: "#/components/examples/CatalogCreate"
              CatalogCreateIcebergStorageBackend:
                $ref: "#/components/examples/CatalogCreateIcebergStorageBackend"
              CatalogCreateIcebergRestBackend:
                $ref: "#/components/examples/CatalogCreateIcebergRestBackend"

      responses:
        "200":
          $ref: "#/components/responses/CatalogResponse"
        "409":
          description: Conflict - The target catalog already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                CatalogAlreadyExistsException:
                  $ref: "#/components/examples/CatalogAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/testConnection:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    post:
      tags:
        - catalog
      summary: Test catalog connection
      operationId: testConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogCreateRequest"
            examples:
              CatalogCreate:
                $ref: "#/components/examples/CatalogCreate"
              CatalogCreateIcebergStorageBackend:
                $ref: "#/components/examples/CatalogCreateIcebergStorageBackend"
              CatalogCreateIcebergRestBackend:
                $ref: "#/components/examples/CatalogCreateIcebergRestBackend"
      responses:
        "200":
          description: Test connection completed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                type: object
                required:
                  - code
                properties:
                  code:
                      type: integer
                      format: int32
                      description: Status code of the response
                  type:
                    type: string
                    description: Internal type definition of the exception
                  message:
                    type: string
                    description: The message of the exception
                  stack:
                    type: array
                    items:
                      type: string
                      description: The stack trace of the exception
              examples:
                TestConnectionSuccess:
                  value: {
                    "code": 0
                  }
                TestConnectionFailed:
                  $ref: "#/components/examples/ConnectionFailedException"
                CatalogAlreadyExists:
                  $ref: "#/components/examples/CatalogAlreadyExistsException"
                MetalakeNotFound:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



  /metalakes/{metalake}/catalogs/{catalog}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"

    get:
      tags:
        - catalog
      summary: Get catalog
      operationId: loadCatalog
      description: |
        Returns the specified live catalog by default. With `include=deleted`, `id` is required
        and the original `{catalog}` name plus immutable ID select one exact deleted catalog tree.
        A deleted read returns the same optimistic restore token in the body and as a strong HTTP
        `ETag` header.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedCatalogId"
      responses:
        "200":
          description: A live catalog or one exact deleted catalog tree
          headers:
            ETag:
              description: Returned only for an exact deleted-catalog read; use as PATCH If-Match
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/CatalogResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect the deleted catalog
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified catalog does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - catalog
      summary: Update catalog
      operationId: alterCatalog
      description: Alters the specified catalog information in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/CatalogResponse"
        "404":
          description: Not Found - The specified catalog does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "409":
            description: Conflict - The target catalog already exists in the specified metalake
            content:
              application/vnd.gravitino.v1+json:
                schema:
                  $ref: "./openapi.yaml#/components/schemas/ErrorModel"
                examples:
                  CatalogAlreadyExistsException:
                    $ref: "#/components/examples/CatalogAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - catalog
      summary: Set catalog in-use or restore a soft-deleted catalog tree
      operationId: patchCatalog
      description: |
        `application/json` retains the existing `inUse` state update. A conditional restore uses
        `application/merge-patch+json` with `include=deleted`, an immutable `id`, and the strong
        `If-Match` value returned by an exact deleted GET.

        Restore is metadata-only: it revives the exact catalog metadata tree captured by the
        deletion generation, without recreating, querying, or reconciling downstream resources.
        A stale precondition is retryable only after re-reading the same immutable ID and confirming
        that the same deletion generation remains deleted, latest for its name, and restorable.
        A client must never substitute a newer deletion generation automatically.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedCatalogInclude"
        - $ref: "#/components/parameters/restoreCatalogId"
        - $ref: "#/components/parameters/restoreCatalogIfMatch"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSetRequest"
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: The updated in-use state or restored catalog metadata
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/responses/BaseResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "#/components/responses/CatalogResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator for deleted catalog recovery
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The metalake or the exact deleted catalog generation does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "#/components/examples/NoSuchCatalogException"
        "409":
          description: |
            Conflict - Recovery would change the meaning of the deletion generation, including a
            live name or ID conflict, a newer tombstone, a replaced parent, a partially recorded
            tree, purge in progress, or a legacy tombstone without a complete deletion record.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected deleted catalog generation expired or was purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed; re-read before retrying
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - Restore requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - Restore requires the strong If-Match header
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



    delete:
      tags:
        - catalog
      summary: Drop catalog
      operationId: dropCatalog
      parameters:
        - $ref: "./openapi.yaml#/components/parameters/force"
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"



components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the catalogs
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live catalogs or retained deleted catalog trees
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    catalogNameFilter:
      name: name
      in: query
      description: Exact catalog-name filter; deleted listings can contain historical generations
      required: false
      schema:
        type: string

    catalogIdFilter:
      name: id
      in: query
      description: Immutable catalog-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedCatalogId:
      name: id
      in: query
      description: Immutable catalog ID required for an exact deleted-catalog read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedCatalogInclude:
      name: include
      in: query
      description: Required for the merge-patch restore variant; ignored by the in-use PATCH variant
      required: false
      schema:
        type: string
        enum:
          - deleted

    restoreCatalogId:
      name: id
      in: query
      description: Immutable ID required for the merge-patch restore variant
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreCatalogIfMatch:
      name: If-Match
      in: header
      description: Strong ETag required for the merge-patch restore variant
      required: false
      schema:
        type: string

  schemas:

    Catalog:
      type: object
      description: A catalog
      required:
        - name
        - type
        - provider
        - audit
      properties:
        name:
          type: string
          description: The name of the catalog
        type:
          type: string
          description: The type of the catalog
          enum:
            - relational
            - fileset
            - messaging
            - model
        provider:
          type: string
          description: The provider of the catalog
          enum:
            - hive
            - lakehouse-iceberg
            - lakehouse-paimon
            - lakehouse-hudi
            - jdbc-mysql
            - jdbc-postgresql
            - jdbc-doris
            - fileset
            - kafka
            - model
        comment:
          type: string
          description: A comment about the catalog
          nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        properties:
          type: object
          description: Configured string to string map of properties for the catalog
          default: { }
          additionalProperties:
            type: string

    CatalogListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        identifiers:
          type: array
          items:
            $ref: "./openapi.yaml#/components/schemas/NameIdentifier"

    CatalogInfoListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        catalogs:
          type: array
          description: A list of catalog objects
          items:
            $ref: "#/components/schemas/Catalog"

    CatalogCreateRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the catalog
        type:
          type: string
          description: The type of the catalog
          enum:
            - relational
            - fileset
            - messaging
            - model
        provider:
          type: string
          description: The provider of the catalog (provider is not required for fileset and model catalog)
          enum:
            - hive
            - lakehouse-iceberg
            - lakehouse-paimon
            - lakehouse-hudi
            - jdbc-mysql
            - jdbc-postgresql
            - jdbc-doris
            - jdbc-oceanbase
            - kafka
        comment:
          type: string
          description: A comment for the catalog
          nullable: true
        properties:
          type: object
          description: A map of properties for the catalog
          nullable: true
          default: { }
          additionalProperties:
            type: string

    CatalogSetRequest:
      type: object
      required:
        - inUse
      properties:
        inUse:
          type: boolean
          description: The in-use status of the catalog to set
      example: {
        "inUse": true
      }

    CatalogUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/CatalogUpdateRequest"

    CatalogUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/RenameCatalogRequest"
        - $ref: "#/components/schemas/UpdateCatalogCommentRequest"
        - $ref: "#/components/schemas/SetCatalogPropertyRequest"
        - $ref: "#/components/schemas/RemoveCatalogPropertyRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/schemas/RenameCatalogRequest"
          updateComment: "#/components/schemas/UpdateCatalogCommentRequest"
          setProperty: "#/components/schemas/SetCatalogPropertyRequest"
          removeProperty: "#/components/schemas/RemoveCatalogPropertyRequest"

    RenameCatalogRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the catalog
      example: {
        "@type": "rename",
        "newName": "my_catalog_new"
      }

    UpdateCatalogCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the catalog
      example: {
        "@type": "updateComment",
        "newComment": "This is my new catalog comment"
      }

    SetCatalogPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The property to set
        value:
          type: string
          description: The value to set
      example: {
        "@type": "setProperty",
        "property": "key1",
        "value": "value1"
      }

    RemoveCatalogPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The property to remove
      example: {
        "@type": "removeProperty",
        "property": "key2"
      }


  responses:

    CatalogResponse:
      description: Returns included catalog object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              catalog:
                $ref: "#/components/schemas/Catalog"
          examples:
            CatalogResponse:
              $ref: "#/components/examples/CatalogResponse"


  examples:
    CatalogListResponse:
      value: {
        "code": 0,
        "identifiers": [
          {
            "namespace": [
              "my_metalake"
            ],
            "name": "my_hive_catalog"
          }
        ]
      }

    CatalogInfoListResponse:
      value: {
        "code": 0,
        "catalogs": [
          {
            "name": "my_hive_catalog",
            "type": "relational",
            "provider": "hive",
            "comment": "This is my hive catalog",
            "properties": {
              "key1": "value1",
              "gravitino.bypass.hive.metastore.client.capability.check": "false",
              "metastore.uris": "thrift://127.0.0.1:9083"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T03:41:25.595Z"
            }
          },
          {
            "name": "my_hadoop_catalog",
            "type": "fileset",
            "provider": "fileset",
            "comment": "This is my hadoop catalog",
            "properties": {
              "key2": "value2"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T06:41:25.595Z"
            }
          }
        ]
      }

    CatalogCreate:
      value: {
        "name": "my_hive_catalog",
        "type": "relational",
        "provider": "hive",
        "comment": "This is my hive catalog",
        "properties": {
          "metastore.uris": "thrift://127.0.0.1:9083",
          "key1": "value1"
        }
      }

    # Iceberg with a storage backend (hive/jdbc): `warehouse` is a physical storage LOCATION.
    CatalogCreateIcebergStorageBackend:
      summary: "Iceberg catalog (hive/jdbc backend): warehouse is a storage location"
      description: >-
        For the `lakehouse-iceberg` provider with `catalog-backend` set to `hive` or `jdbc`,
        the `warehouse` property is a physical storage location (e.g. `s3a://bucket/path` or
        `hdfs://ns/path`) and is required.
      value: {
        "name": "my_iceberg_catalog",
        "type": "relational",
        "provider": "lakehouse-iceberg",
        "comment": "Iceberg catalog backed by a Hive metastore",
        "properties": {
          "catalog-backend": "hive",
          "uri": "thrift://127.0.0.1:9083",
          "warehouse": "s3a://my-bucket/warehouse"
        }
      }

    # Iceberg with the REST backend: `warehouse` is a CATALOG SELECTOR, not a storage location.
    CatalogCreateIcebergRestBackend:
      summary: "Iceberg catalog (REST backend): warehouse selects a catalog, or omit for the default"
      description: >-
        For the `lakehouse-iceberg` provider with `catalog-backend` set to `rest`, the
        `warehouse` property is NOT a storage location. It is forwarded to the Iceberg REST
        server (`GET /v1/config?warehouse=...`) as a catalog selector: a catalog name for
        Gravitino's Iceberg REST server (omit it to use the default catalog), or a
        server-defined identifier such as an Amazon S3 Tables bucket ARN. A storage URI like
        `s3://...` here is a common mistake copied from hive/jdbc examples and will fail to
        resolve.
      value: {
        "name": "my_iceberg_rest_catalog",
        "type": "relational",
        "provider": "lakehouse-iceberg",
        "comment": "Iceberg catalog backed by a remote Iceberg REST server",
        "properties": {
          "catalog-backend": "rest",
          "uri": "http://127.0.0.1:9001/iceberg"
        }
      }

    CatalogResponse:
      value: {
        "code": 0,
        "catalog": {
          "name": "my_hive_catalog",
          "type": "relational",
          "provider": "hive",
          "comment": "This is my hive catalog",
          "properties": {
            "key1": "value1",
            "gravitino.bypass.hive.metastore.client.capability.check": "false",
            "metastore.uris": "thrift://127.0.0.1:9083"
          },
          "audit": {
            "creator": "gravitino",
            "createTime": "2023-12-08T03:41:25.595Z"
          }
        }
      }

    CatalogAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "CatalogAlreadyExistsException",
        "message": "Failed to operate catalog(s) [my_catalog] operation [CREATE], reason [CatalogAlreadyExistsException]",
        "stack": [
          "org.apache.gravitino.exceptions.CatalogAlreadyExistsException: Catalog my_catalog already exists",
          "..."
        ]
      }

    ConnectionFailedException:
      value: {
        "code": 1007,
        "type": "ConnectionFailedException",
        "message": "Failed to run getAllDatabases in Hive Metastore: Failed to connect to Hive Metastore",
        "stack": [
          "org.apache.gravitino.exceptions.ConnectionFailedException: Failed to run getAllDatabases in Hive Metastore: Failed to connect to Hive Metastore",
          "..."
        ]
      }

    NoSuchCatalogException:
      value: {
        "code": 1003,
        "type": "NoSuchCatalogException",
        "message": "Failed to operate catalog(s) [test] operation [LOAD] under metalake [my_test_metalake], reason [NoSuchCatalogException]",
        "stack": [
          "org.apache.gravitino.exceptions.NoSuchCatalogException: Catalog my_test_metalake.test does not exist",
          "..."
        ]
      }

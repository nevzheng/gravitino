---

paths:

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/functions:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"

    get:
      tags:
        - function
      summary: List functions
      operationId: listFunctions
      description: |
        Lists live functions by default. `include=deleted` returns recoverable metadata-deletion
        records and supports exact `name` and `id` filters. Deleted collection responses do not
        carry an ETag; read an exact deleted function before restoring it. Deleted-function reads
        are temporarily restricted to service administrators. `details=true` cannot be combined
        with `include=deleted`.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/functionNameFilter"
        - $ref: "#/components/parameters/functionIdFilter"
      responses:
        "200":
          description: |
            Returns deleted metadata records when `include=deleted`; otherwise returns function
            objects when `details=true` and function identifiers when `details=false`.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/EntityListResponse"
                  - $ref: "#/components/schemas/FunctionListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                FunctionListResponse:
                  $ref: "#/components/examples/FunctionListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted functions in the schema
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - function
      summary: Register function
      operationId: registerFunction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunctionRegisterRequest"
            examples:
              FunctionRegisterRequest:
                $ref: "#/components/examples/FunctionRegisterRequest"
      responses:
        "200":
          $ref: "#/components/responses/FunctionResponse"
        "409":
          description: Conflict - The target function already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                FunctionAlreadyExistsException:
                  $ref: "#/components/examples/FunctionAlreadyExistsException"
        "404":
          description: Not Found - The schema does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}/functions/{function}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"
      - $ref: "./openapi.yaml#/components/parameters/function"

    get:
      tags:
        - function
      summary: Get function
      operationId: getFunction
      description: |
        Returns the specified live function by default. With `include=deleted`, `id` is required
        and the path name plus immutable ID select one exact tombstone under the live parent path.
        The deleted representation is metadata-only and carries a strong ETag for PATCH.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedFunctionId"
      responses:
        "200":
          description: A live function or one exact deleted-function generation
          headers:
            ETag:
              description: Returned only for an exact deleted-function read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/FunctionResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted function
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The target function does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "./schemas.yaml#/components/examples/NoSuchSchemaException"
                NoSuchFunctionException:
                  $ref: "#/components/examples/NoSuchFunctionException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - function
      summary: Alter function
      operationId: alterFunction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunctionUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/FunctionResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The target function does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchFunctionException:
                  $ref: "#/components/examples/NoSuchFunctionException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - function
      summary: Restore a soft-deleted function
      operationId: restoreFunction
      description: |
        Makes one exact soft-deleted function generation active again. The immutable `id`, path
        name, and strong `If-Match` value bind PATCH to the exact representation returned by GET.

        Restore is metadata-only. It restores the function base row, the function versions that
        were live at drop time, and Gravitino owner, grant, and tag relations. It does not contact,
        validate, or recreate anything in a downstream system. The same accepted ETag can be
        replayed only while this generation remains latest and the exact function ID is live at
        its original parent and name.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedFunctionInclude"
        - $ref: "#/components/parameters/restoreFunctionId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          $ref: "#/components/responses/FunctionResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The token does not identify the requested function ID and name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name or ID is occupied, a newer same-name tombstone exists, the parent
            changed, purge is in progress, or the tombstone predates complete deletion records.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - function
      summary: Drop function
      operationId: dropFunction
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the functions
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live functions or soft-deleted function records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    functionNameFilter:
      name: name
      in: query
      description: Exact function-name filter
      required: false
      schema:
        type: string

    functionIdFilter:
      name: id
      in: query
      description: Immutable function-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedFunctionId:
      name: id
      in: query
      description: Immutable function ID required for an exact deleted-function read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreFunctionId:
      name: id
      in: query
      description: Immutable ID of the soft-deleted function generation to restore
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedFunctionInclude:
      name: include
      in: query
      description: Selects the exact deleted function targeted by this conditional PATCH
      required: true
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag returned by the exact deleted-function GET
      required: true
      schema:
        type: string

  schemas:
    Function:
      type: object
      required:
        - name
        - functionType
        - definitions
        - audit
      properties:
        name:
          type: string
          description: The name of the function
        functionType:
          type: string
          description: The type of the function
          enum:
            - SCALAR
            - AGGREGATE
            - TABLE
        deterministic:
          type: boolean
          description: Whether the function is deterministic
          default: false
        comment:
          type: string
          description: The comment of the function
          nullable: true
        definitions:
          type: array
          description: The definitions of the function
          items:
            $ref: "#/components/schemas/FunctionDefinition"
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"

    FunctionDefinition:
      type: object
      properties:
        parameters:
          type: array
          description: The parameters of the function definition
          items:
            $ref: "#/components/schemas/FunctionParam"
        returnType:
          $ref: "./datatype.yaml#/components/schemas/DataType"
          description: The return type of the function (for SCALAR and AGGREGATE functions)
        returnColumns:
          type: array
          description: The return columns of the function (for TABLE functions)
          nullable: true
          items:
            $ref: "#/components/schemas/FunctionColumn"
        impls:
          type: array
          description: The implementations of the function definition
          items:
            $ref: "#/components/schemas/FunctionImpl"

    FunctionParam:
      type: object
      required:
        - name
        - dataType
      properties:
        name:
          type: string
          description: The name of the parameter
        dataType:
          $ref: "./datatype.yaml#/components/schemas/DataType"
          description: The data type of the parameter
        comment:
          type: string
          description: The comment of the parameter
          nullable: true
        defaultValue:
          $ref: "./expression.yaml#/components/schemas/FunctionArg"
          description: The default value expression of the parameter

    FunctionColumn:
      type: object
      required:
        - name
        - dataType
      properties:
        name:
          type: string
          description: The name of the return column
        dataType:
          $ref: "./datatype.yaml#/components/schemas/DataType"
          description: The data type of the return column
        comment:
          type: string
          description: The comment of the return column
          nullable: true

    FunctionImpl:
      type: object
      description: A function implementation, discriminated by the language field
      required:
        - language
        - runtime
      discriminator:
        propertyName: language
        mapping:
          SQL: "#/components/schemas/SQLImpl"
          JAVA: "#/components/schemas/JavaImpl"
          PYTHON: "#/components/schemas/PythonImpl"
      oneOf:
        - $ref: "#/components/schemas/SQLImpl"
        - $ref: "#/components/schemas/JavaImpl"
        - $ref: "#/components/schemas/PythonImpl"

    SQLImpl:
      type: object
      required:
        - language
        - runtime
        - sql
      properties:
        language:
          type: string
          enum:
            - SQL
        runtime:
          type: string
          description: The runtime type of the implementation
          enum:
            - SPARK
            - TRINO
        sql:
          type: string
          description: The SQL expression
        resources:
          $ref: "#/components/schemas/FunctionResources"
        properties:
          type: object
          description: Additional properties
          nullable: true
          additionalProperties:
            type: string

    JavaImpl:
      type: object
      required:
        - language
        - runtime
        - className
      properties:
        language:
          type: string
          enum:
            - JAVA
        runtime:
          type: string
          description: The runtime type of the implementation
          enum:
            - SPARK
            - TRINO
        className:
          type: string
          description: The fully qualified class name
        resources:
          $ref: "#/components/schemas/FunctionResources"
        properties:
          type: object
          description: Additional properties
          nullable: true
          additionalProperties:
            type: string

    PythonImpl:
      type: object
      required:
        - language
        - runtime
      properties:
        language:
          type: string
          enum:
            - PYTHON
        runtime:
          type: string
          description: The runtime type of the implementation
          enum:
            - SPARK
            - TRINO
        handler:
          type: string
          description: The Python handler function
          nullable: true
        codeBlock:
          type: string
          description: The Python code block
          nullable: true
        resources:
          $ref: "#/components/schemas/FunctionResources"
        properties:
          type: object
          description: Additional properties
          nullable: true
          additionalProperties:
            type: string

    FunctionResources:
      type: object
      description: External resources required by a function implementation
      properties:
        jars:
          type: array
          description: JAR file URIs
          nullable: true
          items:
            type: string
        files:
          type: array
          description: File URIs
          nullable: true
          items:
            type: string
        archives:
          type: array
          description: Archive URIs
          nullable: true
          items:
            type: string

    FunctionRegisterRequest:
      type: object
      required:
        - name
        - functionType
        - definitions
      properties:
        name:
          type: string
          description: The name of the function. Cannot be empty.
        functionType:
          type: string
          description: The type of the function
          enum:
            - SCALAR
            - AGGREGATE
            - TABLE
        deterministic:
          type: boolean
          description: Whether the function is deterministic
          default: false
        comment:
          type: string
          description: The comment of the function
          nullable: true
        definitions:
          type: array
          description: The function definitions. Must contain at least one definition.
          minItems: 1
          items:
            $ref: "#/components/schemas/FunctionDefinition"

    FunctionUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/FunctionUpdateRequest"

    FunctionUpdateRequest:
      type: object
      oneOf:
        - $ref: "#/components/schemas/UpdateFunctionCommentRequest"
        - $ref: "#/components/schemas/AddFunctionDefinitionRequest"
        - $ref: "#/components/schemas/RemoveFunctionDefinitionRequest"
        - $ref: "#/components/schemas/AddFunctionImplRequest"
        - $ref: "#/components/schemas/UpdateFunctionImplRequest"
        - $ref: "#/components/schemas/RemoveFunctionImplRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          updateComment: "#/components/schemas/UpdateFunctionCommentRequest"
          addDefinition: "#/components/schemas/AddFunctionDefinitionRequest"
          removeDefinition: "#/components/schemas/RemoveFunctionDefinitionRequest"
          addImpl: "#/components/schemas/AddFunctionImplRequest"
          updateImpl: "#/components/schemas/UpdateFunctionImplRequest"
          removeImpl: "#/components/schemas/RemoveFunctionImplRequest"

    UpdateFunctionCommentRequest:
      type: object
      required:
        - "@type"
      properties:
        "@type":
          type: string
          enum:
            - "updateComment"
        newComment:
          type: string
          description: The new comment of the function. Can be null to clear the comment.
          nullable: true
      example: {
        "@type": "updateComment",
        "newComment": "This is a new comment"
      }

    AddFunctionDefinitionRequest:
      type: object
      required:
        - "@type"
        - definition
      properties:
        "@type":
          type: string
          enum:
            - "addDefinition"
        definition:
          $ref: "#/components/schemas/FunctionDefinition"
      example: {
        "@type": "addDefinition",
        "definition": {
          "parameters": [
            {"name": "x", "dataType": "integer"}
          ],
          "returnType": "integer",
          "impls": [
            {
              "language": "SQL",
              "runtime": "SPARK",
              "sql": "x + 1"
            }
          ]
        }
      }

    RemoveFunctionDefinitionRequest:
      type: object
      required:
        - "@type"
        - parameters
      properties:
        "@type":
          type: string
          enum:
            - "removeDefinition"
        parameters:
          type: array
          description: The parameters that identify the definition to remove
          items:
            $ref: "#/components/schemas/FunctionParam"
      example: {
        "@type": "removeDefinition",
        "parameters": [
          {"name": "x", "dataType": "integer"}
        ]
      }

    AddFunctionImplRequest:
      type: object
      required:
        - "@type"
        - parameters
        - implementation
      properties:
        "@type":
          type: string
          enum:
            - "addImpl"
        parameters:
          type: array
          description: The parameters that identify the target definition
          items:
            $ref: "#/components/schemas/FunctionParam"
        implementation:
          $ref: "#/components/schemas/FunctionImpl"
      example: {
        "@type": "addImpl",
        "parameters": [
          {"name": "x", "dataType": "integer"}
        ],
        "implementation": {
          "language": "JAVA",
          "runtime": "SPARK",
          "className": "com.example.MyFunction"
        }
      }

    UpdateFunctionImplRequest:
      type: object
      required:
        - "@type"
        - parameters
        - runtime
        - implementation
      properties:
        "@type":
          type: string
          enum:
            - "updateImpl"
        parameters:
          type: array
          description: The parameters that identify the target definition
          items:
            $ref: "#/components/schemas/FunctionParam"
        runtime:
          type: string
          description: The runtime of the implementation to update
          enum:
            - SPARK
            - TRINO
        implementation:
          $ref: "#/components/schemas/FunctionImpl"
      example: {
        "@type": "updateImpl",
        "parameters": [
          {"name": "x", "dataType": "integer"}
        ],
        "runtime": "SPARK",
        "implementation": {
          "language": "JAVA",
          "runtime": "SPARK",
          "className": "com.example.MyFunctionV2"
        }
      }

    RemoveFunctionImplRequest:
      type: object
      required:
        - "@type"
        - parameters
        - runtime
      properties:
        "@type":
          type: string
          enum:
            - "removeImpl"
        parameters:
          type: array
          description: The parameters that identify the target definition
          items:
            $ref: "#/components/schemas/FunctionParam"
        runtime:
          type: string
          description: The runtime of the implementation to remove
          enum:
            - SPARK
            - TRINO
      example: {
        "@type": "removeImpl",
        "parameters": [
          {"name": "x", "dataType": "integer"}
        ],
        "runtime": "SPARK"
      }

    FunctionListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        functions:
          type: array
          description: The list of function objects
          items:
            $ref: "#/components/schemas/Function"

  responses:
    FunctionResponse:
      description: The response of function object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              function:
                $ref: "#/components/schemas/Function"
          examples:
            FunctionResponse:
              $ref: "#/components/examples/FunctionResponse"

  examples:
    FunctionRegisterRequest:
      value: {
        "name": "add_one",
        "functionType": "SCALAR",
        "deterministic": true,
        "comment": "A simple scalar function that adds one",
        "definitions": [
          {
            "parameters": [
              {"name": "x", "dataType": "integer"}
            ],
            "returnType": "integer",
            "impls": [
              {
                "language": "SQL",
                "runtime": "SPARK",
                "sql": "x + 1"
              },
              {
                "language": "JAVA",
                "runtime": "SPARK",
                "className": "com.example.AddOneFunction",
                "resources": {
                  "jars": ["hdfs:///path/to/udf.jar"]
                }
              }
            ]
          }
        ]
      }

    TableFunctionRegisterRequest:
      value: {
        "name": "generate_series",
        "functionType": "TABLE",
        "deterministic": true,
        "comment": "A table function that generates a series of integers",
        "definitions": [
          {
            "parameters": [
              {"name": "start_val", "dataType": "integer"},
              {"name": "end_val", "dataType": "integer"}
            ],
            "returnColumns": [
              {"name": "value", "dataType": "integer", "comment": "The generated integer value"}
            ],
            "impls": [
              {
                "language": "JAVA",
                "runtime": "SPARK",
                "className": "com.example.GenerateSeriesFunction",
                "resources": {
                  "jars": ["hdfs:///path/to/udtf.jar"]
                }
              },
              {
                "language": "PYTHON",
                "runtime": "SPARK",
                "handler": "generate_series_handler",
                "codeBlock": "def generate_series_handler(start_val, end_val):\n  for i in range(start_val, end_val + 1):\n    yield (i,)"
              }
            ]
          }
        ]
      }

    FunctionResponse:
      value: {
        "code": 0,
        "function": {
          "name": "add_one",
          "functionType": "SCALAR",
          "deterministic": true,
          "comment": "A simple scalar function that adds one",
          "definitions": [
            {
              "parameters": [
                {"name": "x", "dataType": "integer"}
              ],
              "returnType": "integer",
              "impls": [
                {
                  "language": "SQL",
                  "runtime": "SPARK",
                  "sql": "x + 1"
                }
              ]
            }
          ],
          "audit": {
            "creator": "user1",
            "createTime": "2021-01-01T00:00:00Z",
            "lastModifier": "user1",
            "lastModifiedTime": "2021-01-01T00:00:00Z"
          }
        }
      }

    TableFunctionResponse:
      value: {
        "code": 0,
        "function": {
          "name": "generate_series",
          "functionType": "TABLE",
          "deterministic": true,
          "comment": "A table function that generates a series of integers",
          "definitions": [

---
components:
  schemas:
    TableIndex:
      type: object
      additionalProperties: true
      description: A public table index definition, including catalog-specific properties.
      required: [type, fieldNames, properties]
      properties:
        type:
          type: string
          description: The complete set of index types currently understood by Gravitino.
          enum:
            - PRIMARY_KEY
            - UNIQUE_KEY
            - SCALAR
            - BTREE
            - BITMAP
            - LABEL_LIST
            - INVERTED
            - VECTOR
            - IVF_FLAT
            - IVF_SQ
            - IVF_PQ
            - IVF_HNSW_SQ
            - IVF_HNSW_PQ
            - DATA_SKIPPING_MINMAX
            - DATA_SKIPPING_BLOOM_FILTER
            - DATA_SKIPPING_SET
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: "^\\S(?:[\\s\\S]*\\S)?$"
          description: Omitted when the catalog does not assign an index name.
        fieldNames:
          $ref: "./types.yaml#/components/schemas/FieldNames"
        properties:
          type: object
          maxProperties: 10000
          additionalProperties:
            type: string
            maxLength: 1048576
            pattern: "^[\\s\\S]*$"
          description: Present as an empty object when the index has no properties.
      example:
        type: PRIMARY_KEY
        name: orders_pk
        fieldNames:
          - [id]
        properties: {}

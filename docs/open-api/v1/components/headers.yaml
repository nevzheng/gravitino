---
components:
  headers:
    RequestId:
      required: true
      description: The effective request correlation identifier.
      schema:
        $ref: "./parameters.yaml#/components/schemas/RequestId"
      example: 01JAZ6Y9QZ7E9G2Q4S6M8N1P3R
    ETag:
      required: true
      description: |-
        A strong validator for the canonical V1 resource representation. Use
        it in `If-Match` for PUT or DELETE and in `If-None-Match` for a
        conditional GET.
      schema:
        type: string
        maxLength: 4096
        pattern: '^"[^"\\]+"$'
      example: '"table-7b6fb8f7"'
    Location:
      required: true
      description: The absolute URI of the resource created by this request.
      schema:
        type: string
        format: uri
        maxLength: 4096
      example: http://localhost:8090/api/v1/metalakes/demo
    SuccessCacheControl:
      required: true
      description: |
        Permits private storage but requires validation before reuse. Shared
        caches must not reuse authenticated table metadata.
      schema:
        type: string
        const: private, no-cache
      example: private, no-cache
    NoStoreCacheControl:
      required: true
      description: |-
        Prevents storage of this success response. The initial V1 collection,
        creation, deletion, and parent-resource routes do not yet expose
        conditional-read semantics, so clients must re-request their
        representation.
      schema:
        type: string
        const: no-store
      example: no-store
    ErrorCacheControl:
      required: true
      description: Prevents storage of public error responses.
      schema:
        type: string
        const: no-store
      example: no-store
    Vary:
      required: true
      description: Representation-selection request headers used by caches.
      schema:
        type: string
        const: Authorization, Accept, Accept-Encoding
      example: Authorization, Accept, Accept-Encoding
    RetryAfter:
      required: true
      description: |
        Delay in seconds before another attempt. When the error body contains
        `retryAfterSeconds`, this header is required and its decimal value must
        be identical. Clients honor the header and apply exponential backoff
        with jitter. This contract does not use the HTTP-date form.
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 86400
      example: 5
    Allow:
      required: true
      description: |-
        Comma-separated HTTP methods supported by this resource. For this
        route, the set includes the supported resource methods and OPTIONS. Method-token
        order and optional whitespace are not semantically significant.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Z]+(?:\\s*,\\s*[A-Z]+)*$"
      example: GET, HEAD, OPTIONS
    WWW-Authenticate:
      required: true
      description: |-
        One HTTP authentication challenge, as required on every V1 401 response
        by [RFC 9110 section 11.6.1](https://www.rfc-editor.org/rfc/rfc9110#section-11.6.1).
        A response can include multiple header fields when it offers multiple
        authentication schemes.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
      example: Bearer

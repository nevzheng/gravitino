---
components:
  parameters:
    MetalakeName:
      name: metalake
      in: path
      required: true
      description: The case-sensitive metalake name.
      schema:
        $ref: "#/components/schemas/PathSegment"
      example: demo
    CatalogName:
      name: catalog
      in: path
      required: true
      description: The case-sensitive catalog name.
      schema:
        $ref: "#/components/schemas/PathSegment"
      example: lakehouse
    SchemaName:
      name: schema
      in: path
      required: true
      description: The case-sensitive schema name.
      schema:
        $ref: "#/components/schemas/PathSegment"
      example: sales
    TableName:
      name: table
      in: path
      required: true
      description: The case-sensitive table name.
      schema:
        $ref: "#/components/schemas/PathSegment"
      example: orders
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: |-
        An optional caller correlation identifier. The server accepts it only
        when it conforms to the bounded safe-character schema; otherwise the
        request is rejected with `INVALID_ARGUMENT`. When absent, the server
        generates an identifier. The effective identifier is returned in every
        response and included in every error body.
      schema:
        $ref: "#/components/schemas/RequestId"
      example: 01JAZ6Y9QZ7E9G2Q4S6M8N1P3R
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: |-
        One header field containing one or more entity tags used for
        conditional retrieval. Repeated `If-None-Match` header fields are
        rejected. A matching current representation produces `304 Not Modified`
        without a body.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
        pattern: '^(\*|(?:W/)?"[^"\\]+"(?:\s*,\s*(?:W/)?"[^"\\]+")*)$'
      example: 'W/"table-7b6fb8f7"'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |-
        The strong entity tag returned by the most recent GET of this resource.
        Every V1 PUT and DELETE requires it to prevent a stale client from
        overwriting or deleting a newer representation. A non-matching tag
        returns `412 PRECONDITION_FAILED`; `*` is not accepted by V1.
      schema:
        type: string
        minLength: 3
        maxLength: 4096
        pattern: '^"[^"\\]+"$'
      example: '"b6fb8f7"'
    Force:
      name: force
      in: query
      required: false
      description: |-
        When true, removes a metalake or catalog together with its Gravitino
        metadata descendants. It does not promise deletion of external
        provider data. Defaults to false.
      schema:
        type: boolean
        default: false
      example: false
    Cascade:
      name: cascade
      in: query
      required: false
      description: |-
        When true, removes a schema with its Gravitino metadata descendants.
        It does not promise deletion of external provider data. Defaults to
        false.
      schema:
        type: boolean
        default: false
      example: false
    Purge:
      name: purge
      in: query
      required: false
      description: |-
        When true, asks the backing catalog to purge table data as supported by
        that catalog. When false, the operation drops only according to the
        provider's normal table-drop semantics. Defaults to false.
      schema:
        type: boolean
        default: false
      example: false
  schemas:
    PathSegment:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "^[^/?#]+$"
      description: A decoded resource-name segment. Slash, query, and fragment delimiters are forbidden.
    RequestId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$"
      description: A bounded opaque identifier safe for logs and HTTP headers.

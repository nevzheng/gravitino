---
parameters:
  - $ref: "../components/parameters.yaml#/components/parameters/MetalakeName"
  - $ref: "../components/parameters.yaml#/components/parameters/CatalogName"
  - $ref: "../components/parameters.yaml#/components/parameters/SchemaName"
  - $ref: "../components/parameters.yaml#/components/parameters/RequestId"
get:
  tags: [Schemas]
  security: []
  summary: Get a schema
  description: Returns one public V1 schema representation.
  operationId: getSchemaV1
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/GetSchemaOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
put:
  tags: [Schemas]
  security: []
  summary: Update a schema
  description: |-
    Replaces the complete mutable desired state under `If-Match` and returns
    the V1 schema. The current V1 adapter supports property replacement; a
    request that changes the existing comment returns `501 UNSUPPORTED_OPERATION`
    until the core supports that mutation.
  operationId: updateSchemaV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/resources.yaml#/components/schemas/SchemaUpdateRequest"
        examples:
          Schema:
            $ref: "../components/schemas/resources.yaml#/components/examples/SchemaUpdateRequest"
  parameters:
    - $ref: "../components/parameters.yaml#/components/parameters/IfMatch"
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/GetSchemaOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "412": { $ref: "../components/responses.yaml#/components/responses/PreconditionFailed" }
    "415": { $ref: "../components/responses.yaml#/components/responses/UnsupportedMediaType" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
    "501": { $ref: "../components/responses.yaml#/components/responses/NotImplemented" }
delete:
  tags: [Schemas]
  security: []
  summary: Delete a schema
  description: Deletes a schema. `cascade` is explicit and defaults to false.
  operationId: deleteSchemaV1
  parameters:
    - $ref: "../components/parameters.yaml#/components/parameters/Cascade"
    - $ref: "../components/parameters.yaml#/components/parameters/IfMatch"
  responses:
    "204": { $ref: "../components/responses.yaml#/components/responses/NoContent" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "412": { $ref: "../components/responses.yaml#/components/responses/PreconditionFailed" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }

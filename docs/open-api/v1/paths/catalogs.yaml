---
parameters:
  - $ref: "../components/parameters.yaml#/components/parameters/MetalakeName"
  - $ref: "../components/parameters.yaml#/components/parameters/RequestId"
get:
  tags: [Catalogs]
  security: []
  summary: List catalogs
  description: Returns the complete public V1 catalog collection for one metalake.
  operationId: listCatalogsV1
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/ListCatalogsOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
post:
  tags: [Catalogs]
  security: []
  summary: Create a catalog
  description: Creates a catalog under the metalake and returns its V1 representation.
  operationId: createCatalogV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/resources.yaml#/components/schemas/CatalogCreateRequest"
        examples:
          Catalog:
            $ref: "../components/schemas/resources.yaml#/components/examples/CatalogCreateRequest"
  responses:
    "201": { $ref: "../components/responses.yaml#/components/responses/CreatedCatalog" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "415": { $ref: "../components/responses.yaml#/components/responses/UnsupportedMediaType" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }

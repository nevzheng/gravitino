---
parameters:
  - $ref: "../components/parameters.yaml#/components/parameters/MetalakeName"
  - $ref: "../components/parameters.yaml#/components/parameters/CatalogName"
  - $ref: "../components/parameters.yaml#/components/parameters/RequestId"
get:
  tags: [Schemas]
  security: []
  summary: List schemas
  description: Returns the complete public V1 schema collection for one catalog.
  operationId: listSchemasV1
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/ListSchemasOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
post:
  tags: [Schemas]
  security: []
  summary: Create a schema
  description: Creates a schema under a catalog and returns its V1 representation.
  operationId: createSchemaV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/resources.yaml#/components/schemas/SchemaCreateRequest"
        examples:
          Schema:
            $ref: "../components/schemas/resources.yaml#/components/examples/SchemaCreateRequest"
  responses:
    "201": { $ref: "../components/responses.yaml#/components/responses/CreatedSchema" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "415": { $ref: "../components/responses.yaml#/components/responses/UnsupportedMediaType" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }

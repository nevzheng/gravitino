---
parameters:
  - $ref: "../components/parameters.yaml#/components/parameters/MetalakeName"
  - $ref: "../components/parameters.yaml#/components/parameters/RequestId"
get:
  tags: [Metalakes]
  security: []
  summary: Get a metalake
  description: Returns one public V1 metalake representation.
  operationId: getMetalakeV1
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/GetMetalakeOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
put:
  tags: [Metalakes]
  security: []
  summary: Update a metalake
  description: |-
    Replaces the complete mutable desired state under `If-Match` and returns
    the V1 metalake. The V1 server serializes the read, validator check, and
    core mutation locally; this route does not claim a distributed/provider
    transaction.
  operationId: updateMetalakeV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/resources.yaml#/components/schemas/MetalakeUpdateRequest"
        examples:
          Metalake:
            $ref: "../components/schemas/resources.yaml#/components/examples/MetalakeUpdateRequest"
  parameters:
    - $ref: "../components/parameters.yaml#/components/parameters/IfMatch"
  responses:
    "200": { $ref: "../components/responses.yaml#/components/responses/GetMetalakeOk" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "412": { $ref: "../components/responses.yaml#/components/responses/PreconditionFailed" }
    "415": { $ref: "../components/responses.yaml#/components/responses/UnsupportedMediaType" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
delete:
  tags: [Metalakes]
  security: []
  summary: Delete a metalake
  description: Deletes a metalake. `force` is explicit and defaults to false.
  operationId: deleteMetalakeV1
  parameters:
    - $ref: "../components/parameters.yaml#/components/parameters/Force"
    - $ref: "../components/parameters.yaml#/components/parameters/IfMatch"
  responses:
    "204": { $ref: "../components/responses.yaml#/components/responses/NoContent" }
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "404": { $ref: "../components/responses.yaml#/components/responses/NotFound" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "412": { $ref: "../components/responses.yaml#/components/responses/PreconditionFailed" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }

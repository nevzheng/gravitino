---
parameters:
  - $ref: "../components/parameters.yaml#/components/parameters/RequestId"
get:
  tags: [Metalakes]
  security: []
  summary: List metalakes
  description: Returns the complete public V1 metalake collection visible to the caller.
  operationId: listMetalakesV1
  responses:
    "200":
      $ref: "../components/responses.yaml#/components/responses/ListMetalakesOk"
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }
post:
  tags: [Metalakes]
  security: []
  summary: Create a metalake
  description: Creates a metalake and returns its V1 public representation.
  operationId: createMetalakeV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/resources.yaml#/components/schemas/MetalakeCreateRequest"
        examples:
          Metalake:
            $ref: "../components/schemas/resources.yaml#/components/examples/MetalakeCreateRequest"
  responses:
    "201":
      $ref: "../components/responses.yaml#/components/responses/CreatedMetalake"
    "400": { $ref: "../components/responses.yaml#/components/responses/BadRequest" }
    "401": { $ref: "../components/responses.yaml#/components/responses/Unauthorized" }
    "403": { $ref: "../components/responses.yaml#/components/responses/Forbidden" }
    "409": { $ref: "../components/responses.yaml#/components/responses/Conflict" }
    "415": { $ref: "../components/responses.yaml#/components/responses/UnsupportedMediaType" }
    "500": { $ref: "../components/responses.yaml#/components/responses/InternalError" }

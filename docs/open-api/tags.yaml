---

paths:

  /metalakes/{metalake}/tags:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - tag
      summary: List tags (names)
      operationId: listTags
      description: |
        Returns live tags in the specified metalake by default. The exact `name` filter applies to
        live and deleted results. With `include=deleted`, returns independently deleted tag
        metadata generations and additionally supports the immutable `id` filter. A filter
        mismatch returns an empty collection. `details=true` is not supported with
        `include=deleted`.

        Deleted-tag discovery is metadata-only and temporarily restricted to service
        administrators. Tag-to-metadata-object relations belong to their tag deletion generation
        and have no independent recovery route.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/tagNameFilter"
        - $ref: "#/components/parameters/tagIdFilter"
      responses:
        "200":
          description: Returns live tag names/details or deleted-tag recovery records
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "#/components/responses/TagListResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
                TagListResponse:
                  $ref: "#/components/examples/TagListResponse"
                DeletedEntityListResponse:
                  $ref: "./tables.yaml#/components/examples/DeletedEntityListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect deleted tags
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - tag
      summary: Create tag
      operationId: createTag
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/requests/TagCreateRequest"
            examples:
              TagCreate:
                $ref: "#/components/examples/TagCreate"

      responses:
        "200":
          description: Returns the created tag object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/TagResponse"
              examples:
                TagResponse:
                  $ref: "#/components/examples/TagResponse"
        "409":
          description: Conflict - The target tag already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TagAlreadyExistsException:
                  $ref: "#/components/examples/TagAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/tags/{tag}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/tag"

    get:
      tags:
        - tag
      summary: Get tag
      operationId: getTag
      description: |
        Returns the specified live tag by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact tombstone under the live metalake. The
        deleted representation is metadata-only, carries a strong ETag for conditional PATCH, and
        is temporarily restricted to service administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedTagId"
      responses:
        "200":
          description: A live tag or one exact deleted-tag generation
          headers:
            ETag:
              description: Returned only for an exact deleted-tag read
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/TagResponse"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
              examples:
                TagResponse:
                  $ref: "#/components/examples/TagResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect this deleted tag
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified tag does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchTagException:
                  $ref: "#/components/examples/NoSuchTagException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - tag
      summary: Restore tag metadata
      operationId: restoreTag
      description: |
        Makes one exact soft-deleted tag metadata generation active again. `include=deleted`, the
        immutable `id`, path name, and strong `If-Match` bind PATCH to the exact representation
        returned by GET. Only the latest same-name generation is eligible, and restore is
        temporarily restricted to service administrators.

        Restore is metadata-only. The aggregate consists of the `tag_meta` root and every live
        `tag_relation_meta` row captured when that standalone tag was deleted. Relations
        transition before the tag root during delete, restore, and purge, and the transaction
        verifies the exact affected-row count. A missing or mismatched captured relation fails
        with `INCOMPLETE_GENERATION`, rolls back, and requires manual metadata repair.

        The first deletion that changes an overlapping live relation owns it; a later tag or
        metadata-object deletion never retags the tombstone. Either endpoint root may be restored
        first. Normal joins keep the relation hidden until both roots are live. Prior independent
        or null-token relation tombstones remain deleted. PATCH does not restore owners or grants,
        contact a connector, or replay an external authorization system.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedTagInclude"
        - $ref: "#/components/parameters/restoreTagId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: Returns the restored tag metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/TagResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot restore deleted tags
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The exact tag tombstone or replay receipt does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - The name or ID is occupied; a newer same-name tombstone exists; the
            metalake changed; purge is in progress; the generation is incomplete; or the
            tombstone predates complete deletion records. `INCOMPLETE_GENERATION` means a
            captured relation is missing or inconsistent and requires manual metadata repair.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - If-Match is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - tag
      summary: Update tag
      operationId: alterTag
      description: Alters the specified tag information in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/requests/TagUpdatesRequest"
      responses:
        "200":
            description: Returns the updated tag object
            content:
              application/vnd.gravitino.v1+json:
                schema:
                  $ref: "#/components/responses/TagResponse"
                examples:
                  TagResponse:
                    $ref: "#/components/examples/TagResponse"
        "404":
          description: Not Found - The specified tag does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchTagException:
                  $ref: "#/components/examples/NoSuchTagException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - tag
      summary: Delete tag
      operationId: deleteTag
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/tags:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectType"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectFullName"
    get:
      tags:
        - tag
      summary: List tags (names) for metadata object
      operationId: listObjectTags
      parameters:
        - $ref: "#/components/parameters/details"
      responses:
        "200":
          description: Returns the list of tag objects associated with specified metadata object if {details} is true, otherwise returns the list of tag name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "#/components/responses/TagListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
                TagListResponse:
                  $ref: "#/components/examples/TagListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - tag
      summary: Associate tags with metadata object
      description: Associate and disassociate tags with metadata object, please be aware that supported metadata objects are CATALOG, SCHEMA, TABLE, VIEW, FILESET, TOPIC, COLUMN, MODEL, FUNCTION
      operationId: associateTags
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/requests/TagsAssociateRequest"
            examples:
              TagAssociate:
                $ref: "#/components/examples/TagAssociate"
      responses:
        "200":
          description: Returns the list of tag names associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/NameListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "409":
          description: Conflict - The target tag already associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                TagAlreadyAssociatedException:
                  $ref: "#/components/examples/TagAlreadyAssociatedException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/tags/{tag}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectType"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectFullName"
      - $ref: "./openapi.yaml#/components/parameters/tag"
    get:
      tags:
        - tag
      summary: Get tag for metadata object
      operationId: getObjectTag
      parameters:
        - $ref: "#/components/parameters/details"
      responses:
        "200":
          description: Returns the list of tag objects associated with specified metadata object if {details} is true, otherwise returns the list of tag name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/TagResponse"
              examples:
                TagResponse:
                  $ref: "#/components/examples/TagResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified metalake does not exist or the specified tag is not associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchTagException:
                  $ref: "#/components/examples/NoSuchTagException"
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/tags/{tag}/objects:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/tag"
    get:
      tags:
        - tag
      summary: list metadata objects for tag
      operationId: listTagObjects
      responses:
        "200":
          description: Returns the list of metadata objects associated with specified tag
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/responses/MetadataObjectListResponse"
              examples:
                TagResponse:
                  $ref: "#/components/examples/MetadataObjectListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified tag does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchTagException:
                  $ref: "#/components/examples/NoSuchTagException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the tag
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live tags or soft-deleted tag recovery records
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    tagNameFilter:
      name: name
      in: query
      description: Exact tag-name filter for live or deleted results
      required: false
      schema:
        type: string

    tagIdFilter:
      name: id
      in: query
      description: Immutable tag-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedTagId:
      name: id
      in: query
      description: Immutable tag ID required for an exact deleted-tag read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedTagInclude:
      name: include
      in: query
      description: Required as `deleted` when PATCH restores a deleted tag
      required: true
      schema:
        type: string
        enum:
          - deleted

    restoreTagId:
      name: id
      in: query
      description: Immutable tag ID required when PATCH restores a deleted tag
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag required when PATCH restores a deleted tag
      required: true
      schema:
        type: string

  schemas:

    Tag:
      type: object
      description: A tag
      required:
        - name
        - audit
      properties:
        name:
          type: string
          description: The name of the tag
        comment:
          type: string
          description: A comment about the tag
          nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        properties:
          type: object
          description: Configured string to string map of properties for the tag
          default: { }
          additionalProperties:
            type: string
        inherited:
          type: boolean
          description: Whether the tag is inherited from the parent metadata object
          nullable: true

    MetadataObject:
      type: object
      description: A metadata object
      properties:
        fullName:
          type: string
          description: The name of the metadata object, separated by dots
        type:
          type: string
          description: The type of the metadata object
          enum:
            - "CATALOG"
            - "SCHEMA"
            - "TABLE"
            - "VIEW"
            - "FILESET"
            - "TOPIC"
            - "MODEL"
            - "FUNCTION"
            - "COLUMN"


  requests:

    TagCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the tag
        comment:
          type: string
          description: A comment for the tag
          nullable: true
        properties:
          type: object
          description: A map of properties for the tag
          nullable: true
          default: { }
          additionalProperties:
            type: string

    TagUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/requests/TagUpdateRequest"

    TagUpdateRequest:
      oneOf:
        - $ref: "#/components/requests/RenameTagRequest"
        - $ref: "#/components/requests/UpdateTagCommentRequest"
        - $ref: "#/components/requests/SetTagPropertyRequest"
        - $ref: "#/components/requests/RemoveTagPropertyRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/requests/RenameTagRequest"
          updateComment: "#/components/requests/UpdateTagCommentRequest"
          setProperty: "#/components/requests/SetTagPropertyRequest"
          removeProperty: "#/components/requests/RemoveTagPropertyRequest"

    RenameTagRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the tag
      example: {
        "@type": "rename",
        "newName": "my_tag_new"
      }

    UpdateTagCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the tag
      example: {
        "@type": "updateComment",
        "newComment": "This is my new tag comment"
      }

    SetTagPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The property to set
        value:
          type: string
          description: The value to set
      example: {
        "@type": "setProperty",
        "property": "key1",
        "value": "value1"
      }

    RemoveTagPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The property to remove
      example: {
        "@type": "removeProperty",
        "property": "key2"
      }

    TagsAssociateRequest:
      type: object
      properties:
        tagsToAdd:
          type: array
          items:
            type: string
          description: The tags to add
          nullable: true
        tagsToRemove:
          type: array
          items:
            type: string
          description: The tags to remove
          nullable: true

  responses:
    TagListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        tags:
          type: array
          description: A list of tag objects
          items:
            $ref: "#/components/schemas/Tag"

    TagResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        tag:
          $ref: "#/components/schemas/Tag"

    MetadataObjectListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        metadataObjects:
          type: array
          description: A list of metadata objects
          items:
            $ref: "#/components/schemas/MetadataObject"

  examples:
    NameListResponse:
      value: {
        "code": 0,
        "names": ["my_tag1", "my_tag2"]
      }

    TagListResponse:
      value: {
        "code": 0,
        "tags": [
          {
            "name": "my_tag1",
            "comment": "This is my tag1",
            "properties": {
              "key1": "value1",
              "key2": "value2"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T03:41:25.595Z"
            },
            "inherited": null
          },
          {
            "name": "my_tag2",
            "comment": "This is my tag2",
            "properties": {
              "key2": "value2"
            },
            "audit": {
              "creator": "gravitino",
              "createTime": "2023-12-08T06:41:25.595Z"
            },
            "inherited": null
          }
        ]
      }

    TagCreate:
      value: {
        "name": "my_tag1",
        "comment": "This is my tag1",
        "properties": {
          "key1": "value1",
          "key2": "value2"
        }
      }

    TagAssociate:
      value: {
        "tagsToAdd": ["my_tag1", "my_tag2"],
        "tagsToRemove": ["my_tag3"]
      }

    TagResponse:
      value: {
        "code": 0,
        "tag": {
          "name": "my_tag1",
          "comment": "This is my tag1",
          "properties": {
            "key1": "value1",
            "key2": "value2"
          },
          "audit": {
            "creator": "gravitino",
            "createTime": "2023-12-08T03:41:25.595Z"
          },
          "inherited": false
        }
      }

    MetadataObjectListResponse:
      value: {
        "code": 0,
        "metadataObjects": [
          {
            "type": "CATALOG",
            "fullName":"my_catalog",
          },
          {
            "type": "SCHEMA",
            "fullName":"my_catalog.my_schema",
          },
          {
            "type": "TABLE",
            "fullName":"my_catalog.my_schema.my_table",
          }
        ]
      }

    TagAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "TagAlreadyExistsException",
        "message": "Failed to operate tag(s) [my_tag] operation [CREATE], reason [TagAlreadyExistsException]",

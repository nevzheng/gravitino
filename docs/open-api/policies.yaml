---

paths:

  /metalakes/{metalake}/policies:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
    get:
      tags:
        - policy
      summary: List policies (names)
      operationId: listPolicies
      description: |
        Lists live policies by default. `include=non-deleted` preserves the existing names or
        detailed-policy response. `include=deleted` returns retained policy deletion generations
        for metadata-only recovery. Deleted generations can be filtered by exact `name`, immutable
        `id`, or both; a mismatch returns an empty collection.

        Deleted-policy discovery is temporarily restricted to service administrators. Collection
        responses do not carry an `ETag`; clients must read one exact deleted policy before
        conditionally restoring it.
      parameters:
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/policyNameFilter"
        - $ref: "#/components/parameters/policyIdFilter"
      responses:
        "200":
          description: Returns the list of policy objects if {details} is true, otherwise returns the list of policy names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "#/components/schemas/PolicyListResponse"
                  - $ref: "#/components/schemas/DeletedPolicyListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
                PolicyListResponse:
                  $ref: "#/components/examples/PolicyListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator for a deleted-policy listing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - policy
      summary: Create policy
      operationId: createPolicy
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCreateRequest"
            examples:
              PolicyCreate:
                $ref: "#/components/examples/PolicyCreate"

      responses:
        "200":
          description: Returns the created policy object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
              examples:
                PolicyResponse:
                  $ref: "#/components/examples/PolicyResponse"
        "409":
          description: Conflict - The target policy already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                PolicyAlreadyExistsException:
                  $ref: "#/components/examples/PolicyAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/policies/{policy}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/policy"

    get:
      tags:
        - policy
      summary: Get policy
      operationId: getPolicy
      description: |
        Returns the specified live policy by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact retained deletion generation. The exact
        deleted read returns the restore token in both the response body's `etag` field and a
        strong HTTP `ETag` header. Deleted-policy reads are temporarily restricted to service
        administrators.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedPolicyId"
      responses:
        "200":
          description: Returns the policy object
          headers:
            ETag:
              description: Returned only for an exact deleted-policy read; use it as `If-Match` when restoring.
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PolicyResponse"
                  - $ref: "#/components/schemas/DeletedPolicyResponse"
              examples:
                PolicyResponse:
                  $ref: "#/components/examples/PolicyResponse"
        "400":
          description: Bad Request - the deleted selector is invalid, missing its ID, or combined with a live ID filter
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller is not a service administrator for a deleted-policy read
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified policy does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchPolicyException:
                  $ref: "#/components/examples/NoSuchPolicyException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - policy
      summary: Update policy
      operationId: alterPolicy
      description: Alters the specified policy information in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyUpdatesRequest"
      responses:
        "200":
            description: Returns the updated policy object
            content:
              application/vnd.gravitino.v1+json:
                schema:
                  $ref: "#/components/schemas/PolicyResponse"
                examples:
                  PolicyResponse:
                    $ref: "#/components/examples/PolicyResponse"
        "404":
          description: Not Found - The specified policy does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchPolicyException:
                  $ref: "#/components/examples/NoSuchPolicyException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - policy
      summary: Enable or disable a policy, or restore a soft-deleted policy
      operationId: setPolicy
      description: |
        `application/json` enables or disables a live policy with the existing `PolicySetRequest`
        body. It rejects recovery selectors.

        `application/merge-patch+json` restores one exact soft-deleted policy generation. It
        requires `include=deleted`, the immutable `id`, a strong `If-Match` value returned by an
        exact deleted-policy read, and `{ "deleted": false }`. Restore is metadata-only: it
        restores the policy base row and intrinsic policy versions only. Policy associations,
        owners, grants, and external authorization state are intentionally not changed.

        A restore is idempotent only for the same policy ID and deletion generation. A stale
        `If-Match` receives `412`; clients may read the same immutable ID again and make a bounded
        retry only if that exact generation is still deleted, latest for its name, and restorable.
        Clients must not switch silently to a newer generation.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedPolicyInclude"
        - $ref: "#/components/parameters/restorePolicyId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicySetRequest"
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/PolicyRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          description: A successful live-policy update or restored policy
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/responses/BaseResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "#/components/schemas/PolicyResponse"
        "400":
          description: |
            Bad Request - recovery selectors were used with `application/json`, or the recovery
            selector, ID, strong `If-Match`, or merge-patch body is malformed.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "403":
          description: Forbidden - The caller is not a service administrator for a restore
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The specified policy does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchPolicyException:
                  $ref: "#/components/examples/NoSuchPolicyException"
        "409":
          description: |
            Conflict - A live policy occupies the name, the immutable ID is active or reused, a
            newer tombstone exists for the name, the parent changed, purge is in progress, or the
            recorded policy generation is incomplete. These conflicts require manual resolution.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/PolicyRecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed after it was read
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - A restore requires `If-Match`
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - Restore requires `application/merge-patch+json`
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - policy
      summary: Delete policy
      operationId: deletePolicy
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/policies:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectType"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectFullName"
    get:
      tags:
        - policy
      summary: List policies (names) for metadata object
      operationId: listPoliciesForMetadataObject
      parameters:
        - $ref: "#/components/parameters/details"
      responses:
        "200":
          description: Returns the list of policy objects associated with specified metadata object if {details} is true, otherwise returns the list of policy name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/schemas/NameListResponse"
                  - $ref: "#/components/schemas/PolicyListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
                PolicyListResponse:
                  $ref: "#/components/examples/PolicyListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - policy
      summary: Associate policies with metadata object
      description: Associate and disassociate policies with metadata object, please be aware that supported metadata objects are CATALOG, SCHEMA, TABLE, FILESET, TOPIC, COLUMN
      operationId: associatePoliciesForObject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoliciesAssociateRequest"
            examples:
              PolicyAssociate:
                $ref: "#/components/examples/PolicyAssociate"
      responses:
        "200":
          description: Returns the list of policy names associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/NameListResponse"
              examples:
                NameListResponse:
                  $ref: "#/components/examples/NameListResponse"
        "404":
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "409":
          description: Conflict - The target policy already associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                PolicyAlreadyAssociatedException:
                  $ref: "#/components/examples/PolicyAlreadyAssociatedException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/policies/{policy}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectType"
      - $ref: "./openapi.yaml#/components/parameters/metadataObjectFullName"
      - $ref: "./openapi.yaml#/components/parameters/policy"
    get:
      tags:
        - policy
      summary: Get policy for metadata object
      operationId: getPolicyForObject
      parameters:
        - $ref: "#/components/parameters/details"
      responses:
        "200":
          description: Returns the policy object associated with specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
              examples:
                PolicyResponse:
                  $ref: "#/components/examples/PolicyResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified metalake does not exist or the specified policy is not associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchPolicyException:
                  $ref: "#/components/examples/NoSuchPolicyException"
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


  /metalakes/{metalake}/policies/{policy}/objects:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/policy"
    get:
      tags:
        - policy
      summary: list metadata objects for policy
      operationId: listMetadataObjectsForPolicy
      responses:
        "200":
          description: Returns the list of metadata objects associated with specified policy
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/MetadataObjectListResponse"
              examples:
                PolicyResponse:
                  $ref: "#/components/examples/MetadataObjectListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "404":
          description: Not Found - The specified policy does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchPolicyException:
                  $ref: "#/components/examples/NoSuchPolicyException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"


components:
  parameters:
    details:
      name: details
      in: query
      description: Include detailed information about the policy
      required: false
      schema:
        type: boolean
        default: false

    include:
      name: include
      in: query
      description: Select live policies or retained deleted-policy generations
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    policyNameFilter:
      name: name
      in: query
      description: Exact policy-name filter for a collection listing
      required: false
      schema:
        type: string

    policyIdFilter:
      name: id
      in: query
      description: Immutable policy-ID filter, supported only with `include=deleted`
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    deletedPolicyId:
      name: id
      in: query
      description: Immutable policy ID, required with `include=deleted` on an item read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    restorePolicyId:
      name: id
      in: query
      description: Immutable ID of the deleted policy generation to restore
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
        example: "984273"

    restoreDeletedPolicyInclude:
      name: include
      in: query
      description: Selects the exact deleted representation targeted by this conditional patch
      required: false
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: |
        Strong HTTP entity tag returned by an exact deleted-policy read. Wildcards, weak tags,
        and lists of tags are rejected. The response body's `etag` has the same opaque value
        without HTTP header quoting.
      required: false
      schema:
        type: string

  schemas:

    PolicyRestoreRequest:
      type: object
      description: Merge patch that restores one soft-deleted policy generation
      required:
        - deleted
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          description: Must be false to restore the selected policy generation
          enum:
            - false

    DeletedPolicy:
      type: object
      description: A retained, metadata-only policy deletion generation
      required:
        - deleted
        - id
        - deletionId
        - name
        - type
        - deletedAt
        - expiresAt
        - etag
        - latestForName
        - restorable
      properties:
        deleted:
          type: boolean
          enum:
            - true
        id:
          type: string
          description: Immutable Gravitino policy ID
          example: "984273"
        deletionId:
          type: string
          description: Identifier for this deletion generation
          example: "policy-77192"
        name:
          type: string
          description: Original policy name
        type:
          type: string
          enum:
            - policy
        deletedAt:
          type: integer
          format: int64
          description: Deletion time in milliseconds since the Unix epoch
        expiresAt:
          type: integer
          format: int64
          description: Effective retention expiry in milliseconds since the Unix epoch
        deletedBy:
          type: string
          description: Principal that deleted the policy, when available
          nullable: true
        version:
          type: integer
          format: int64
          description: Current policy version captured at deletion time
          minimum: 1
        etag:
          type: string
          description: Opaque strong representation token for conditional restore
        latestForName:
          type: boolean
          description: Whether this is the most recent deletion generation for the name
        restorable:
          type: boolean
          description: Whether the server currently considers this generation restorable
        reason:
          type: string
          nullable: true
          description: Machine-readable reason a non-restorable generation cannot be restored

    DeletedPolicyResponse:
      type: object
      required:
        - code
        - deletedEntity
      properties:
        code:
          type: integer
          format: int32
          enum:
            - 0
        deletedEntity:
          $ref: "#/components/schemas/DeletedPolicy"

    DeletedPolicyListResponse:
      type: object
      required:
        - code
        - deletedEntities
      properties:
        code:
          type: integer
          format: int32
          enum:
            - 0
        deletedEntities:
          type: array
          description: Deleted policy generations selected by the query filters
          items:
            $ref: "#/components/schemas/DeletedPolicy"

    PolicyRecoveryConflictError:
      allOf:
        - $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        - type: object
          required:
            - reason
          properties:
            reason:
              type: string
              description: Stable reason the requested restore cannot preserve its meaning
              enum:
                - NOT_LATEST_TOMBSTONE
                - ENTITY_ID_REUSED
                - NAME_OCCUPIED
                - PARENT_CHANGED
                - PURGE_IN_PROGRESS
                - LEGACY_TOMBSTONE
                - INCOMPLETE_GENERATION

    PolicyContentBase:
      type: object
      description: A base content structure for policies
      required:
        - supportedObjectTypes
      properties:
        supportedObjectTypes:
          type: array
          description: The types of metadata objects this policy content can be applied to.
          minItems: 1
          items:
            type: string
            enum: [ "CATALOG", "SCHEMA", "TABLE", "FILESET", "TOPIC", "MODEL" ]
        properties:
          type: object
          description: A map of string-to-string properties for the policy content.
          additionalProperties:
            type: string
          example:
            "key1": "value1"
            "key2": "value2"

    CustomPolicyContent:
      type: object
      description: Content for a custom policy type.
      allOf:
        - $ref: '#/components/schemas/PolicyContentBase'
        - type: object
          properties:
            customRules:
              type: object
              description: A map of custom rules where the key is the rule name and the value can be of any type.
              additionalProperties: { }
              example:
                rule1: "rule1"
                rule2: 123

    PolicyBase:
      type: object
      description: A basic policy without content
      required:
        - name
        - policyType
        - enabled
        - audit
      properties:
        name:
          type: string
          description: The name of the policy
        comment:
          type: string
          description: A comment about the policy
          nullable: true
        policyType:
          type: string
          description: The type of the policy
        enabled:
          type: boolean
          description: Whether the policy is enabled
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        inherited:
          type: boolean
          description: Whether the policy is inherited from the parent metadata object
          nullable: true

    CustomPolicy:
      description: A policy with custom content
      allOf:
        - $ref: '#/components/schemas/PolicyBase'
        - type: object
          required:
            - content
          properties:
            content:
              $ref: '#/components/schemas/CustomPolicyContent'

    Policy:
      type: object
      description: A basic policy without content
      oneOf:
        - $ref: '#/components/schemas/CustomPolicy'
      discriminator:
        propertyName: policyType
        mapping:
          custom: '#/components/schemas/CustomPolicy'

    PolicyListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        policies:
          type: array
          description: A list of policy objects
          items:
            $ref: "#/components/schemas/Policy"

    MetadataObject:
      type: object
      description: A metadata object
      properties:
        fullName:
          type: string
          description: The name of the metadata object, separated by dots
        type:
          type: string
          description: The type of the metadata object
          enum:
            - "CATALOG"
            - "SCHEMA"
            - "TABLE"
            - "FILESET"
            - "TOPIC"
            - "MODEL"
            - "COLUMN"

    PolicyCreateRequestBase:
      type: object
      description: A base policy create request without content
      required:
        - name
        - policyType
      properties:
        name:
          type: string
          description: The name of the policy
        comment:
          type: string
          description: A comment for the policy
          nullable: true
        policyType:
          type: string
          description: The type of the policy
        enabled:
          type: boolean
          description: Whether the policy is enabled
          default: true

    CustomPolicyCreateRequest:
      description: A request to create a policy with a custom content structure.
      allOf:
        - $ref: '#/components/schemas/PolicyCreateRequestBase'
        - type: object
          required:
            - content
          properties:
            content:
              $ref: '#/components/schemas/CustomPolicyContent'

    PolicyCreateRequest:
      description: A request to create a policy.
      type: object
      oneOf:
        - $ref: '#/components/schemas/CustomPolicyCreateRequest'
      discriminator:
        propertyName: policyType
        mapping:
          custom: '#/components/schemas/CustomPolicyCreateRequest'


    PolicyUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/PolicyUpdateRequest"

    PolicyUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/RenamePolicyRequest"
        - $ref: "#/components/schemas/UpdatePolicyCommentRequest"
        - $ref: "#/components/schemas/UpdatePolicyContentRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          rename: "#/components/schemas/RenamePolicyRequest"
          updateComment: "#/components/schemas/UpdatePolicyCommentRequest"
          updateContent: "#/components/schemas/UpdatePolicyContentRequest"

    RenamePolicyRequest:
      type: object
      required:
        - "@type"
        - newName
      properties:
        "@type":
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the policy
      example: {
        "@type": "rename",
        "newName": "my_policy_new"
      }

    PolicySetRequest:
      type: object
      properties:
        enable:
          type: boolean
          description: Whether to enable or disable the policy

    UpdatePolicyCommentRequest:
      type: object
      required:
        - "@type"
        - newComment
      properties:
        "@type":
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the policy
      example: {
        "@type": "updateComment",
        "newComment": "This is my new policy comment"
      }

    UpdatePolicyContentRequest:
      type: object
      required:
        - "@type"
        - policyType
        - newContent
      properties:
        "@type":
          type: string
          enum:
            - updateContent
        policyType:
          type: string
          description: The type of the policy
        newContent:
          type: object
          description: The new content of the policy, its structure depends on the 'policyType'.
          oneOf:
              - $ref: '#/components/schemas/CustomPolicyContent'
          discriminator:
            propertyName: policyType
            mapping:
              custom: '#/components/schemas/CustomPolicyContent'
      example: {
        "@type": "updateContent",
        "policyType": "custom",
        "newContent": {
          "policyType": "custom",
          "customRules": {
            "rule1": 456
          },
          "supportedObjectTypes": [
              "CATALOG",
              "SCHEMA",
              "TABLE",
              "FILESET",
              "TOPIC",
              "MODEL"
          ],
          "properties": {
            "key1": "new_value1",
            "key2": "new_value2"
          }
        }
      }

    PoliciesAssociateRequest:
      type: object
      properties:
        policiesToAdd:
          type: array
          items:
            type: string
          description: The policies to add
          nullable: true
        policiesToRemove:
          type: array
          items:
            type: string
          description: The policies to remove
          nullable: true

    PolicyResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        policy:
          $ref: "#/components/schemas/Policy"

    MetadataObjectListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        metadataObjects:
          type: array
          description: A list of metadata objects
          items:
            $ref: "#/components/schemas/MetadataObject"

  examples:

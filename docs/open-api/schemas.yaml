---

paths:

  /metalakes/{metalake}/catalogs/{catalog}/schemas:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"

    get:
      tags:
        - schema
      summary: List schemas
      operationId: listSchemas
      description: |
        Lists live schemas by default. `include=deleted` returns independently deleted schema-tree
        roots as retained metadata-deletion records. Cascaded descendants are restored with their
        root and are not separate recovery targets. Exact `name` and `id` filters may be combined.
        A deleted collection has no HTTP ETag; read one exact deleted schema before PATCH.
      parameters:
        - $ref: "#/components/parameters/parentSchema"
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/schemaNameFilter"
        - $ref: "#/components/parameters/schemaIdFilter"
      responses:
        "200":
          description: Live schema identifiers or deleted schema-tree roots
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "./openapi.yaml#/components/responses/EntityListResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityListResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot list deleted schemas
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    post:
      tags:
        - schema
      summary: Create schema
      operationId: createSchema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaCreateRequest"
            examples:
              SchemaCreate:
                $ref: "#/components/examples/SchemaCreate"

      responses:
        "200":
          $ref: "#/components/responses/SchemaResponse"
        "409":
          description: Conflict - The target schema already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                SchemaAlreadyExistsErrorResponse:
                  $ref: "#/components/examples/SchemaAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /metalakes/{metalake}/catalogs/{catalog}/schemas/{schema}:
    parameters:
      - $ref: "./openapi.yaml#/components/parameters/metalake"
      - $ref: "./openapi.yaml#/components/parameters/catalog"
      - $ref: "./openapi.yaml#/components/parameters/schema"

    get:
      tags:
        - schema
      summary: Get schema
      operationId: loadSchema
      description: |
        Returns the specified live schema by default. With `include=deleted`, `id` is required and
        the path name plus immutable ID select one exact schema-tree root. A deleted read returns
        the restore token in the response body and a strong HTTP `ETag` header.
      parameters:
        - $ref: "#/components/parameters/include"
        - $ref: "#/components/parameters/deletedSchemaId"
      responses:
        "200":
          description: A live schema or one exact deleted schema-tree root
          headers:
            ETag:
              description: Returned only for an exact deleted-schema read; use as PATCH If-Match
              schema:
                type: string
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: "#/components/responses/SchemaResponse/content/application~1vnd.gravitino.v1%2Bjson/schema"
                  - $ref: "./tables.yaml#/components/schemas/DeletedEntityResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller cannot inspect the deleted schema
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The target schema does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "#/components/examples/NoSuchSchemaException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    patch:
      tags:
        - schema
      summary: Restore a soft-deleted schema tree
      operationId: restoreSchema
      description: |
        Makes one exact soft-deleted schema-tree root active again. `id`, the original `{schema}`
        path, and `If-Match` bind the merge patch to the deleted representation returned by GET.

        Restore is metadata-only: it restores the exact recorded Gravitino schema tree and does
        not contact a catalog connector or reconcile downstream objects. If the recorded tree is
        incomplete or its required external metadata no longer exists, the operation fails without
        a partial revival; repair the metadata manually before retrying.
      parameters:
        - $ref: "#/components/parameters/restoreDeletedSchemaInclude"
        - $ref: "#/components/parameters/restoreSchemaId"
        - $ref: "#/components/parameters/ifMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "./tables.yaml#/components/schemas/EntityRestoreRequest"
            example:
              deleted: false
      responses:
        "200":
          $ref: "#/components/responses/SchemaResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "403":
          description: Forbidden - The caller is not a service administrator
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "404":
          description: Not Found - The token does not identify the requested schema ID and path
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "409":
          description: |
            Conflict - A live name or ID conflicts, a newer same-name tombstone exists, a parent
            changed, the generation is incomplete, an external relation source is missing, purge
            is in progress, or the tombstone predates complete deletion records.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./tables.yaml#/components/schemas/RecoveryConflictError"
        "410":
          description: Gone - The selected tombstone expired or was permanently purged
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "412":
          description: Precondition Failed - The exact deleted representation changed
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "415":
          description: Unsupported Media Type - PATCH requires application/merge-patch+json
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "428":
          description: Precondition Required - The required If-Match header is missing
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    put:
      tags:
        - schema
      summary: Update schema
      operationId: alterSchema
      description: Updates the specified schema in the specified catalog and metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaUpdatesRequest"
      responses:
        "200":
          $ref: "#/components/responses/SchemaResponse"
        "404":
          description: Not Found - The target schema does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                NoSuchMetalakeException:
                  $ref: "./metalakes.yaml#/components/examples/NoSuchMetalakeException"
                NoSuchCatalogException:
                  $ref: "./catalogs.yaml#/components/examples/NoSuchCatalogException"
                NoSuchSchemaException:
                  $ref: "#/components/examples/NoSuchSchemaException"
        "409":
          description: Conflict - The target schema already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
              examples:
                SchemaAlreadyExistsExistsException:
                  $ref: "#/components/examples/SchemaAlreadyExistsException"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

    delete:
      tags:
        - schema
      summary: Drop schema
      operationId: dropSchema
      responses:
        "200":
          $ref: "./openapi.yaml#/components/responses/DropResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:

  parameters:
    parentSchema:
      name: parentSchema
      in: query
      description: >
        The parent schema whose direct child schemas are listed. Only meaningful for catalogs that
        support hierarchical (multi-level) schemas, such as an Iceberg catalog accessed through the
        Gravitino REST server with a configured schema separator (`gravitino.schema.separator`,
        default `:`). For example, when the schemas `a`, `a:b` and `a:b:c` exist, listing with
        `parentSchema=a:b` returns `[a:b:c]`. When omitted, only the top-level schemas under the
        catalog are returned (the direct children of the catalog root, e.g. `a`), not the nested
        ones.
      required: false
      schema:
        type: string

    include:
      name: include
      in: query
      description: Select live schemas or soft-deleted schema-tree roots
      required: false
      schema:
        type: string
        default: non-deleted
        enum:
          - non-deleted
          - deleted

    schemaNameFilter:
      name: name
      in: query
      description: Exact logical schema-name filter; deleted roots may have historical generations
      required: false
      schema:
        type: string

    schemaIdFilter:
      name: id
      in: query
      description: Immutable schema-ID filter, supported only with include=deleted
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    deletedSchemaId:
      name: id
      in: query
      description: Immutable schema ID required for an exact deleted-schema read
      required: false
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreSchemaId:
      name: id
      in: query
      description: Immutable ID of the soft-deleted schema-tree root to restore
      required: true
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"

    restoreDeletedSchemaInclude:
      name: include
      in: query
      description: Selects the exact deleted schema-tree root targeted by this conditional PATCH
      required: true
      schema:
        type: string
        enum:
          - deleted

    ifMatch:
      name: If-Match
      in: header
      description: Strong ETag returned by the exact deleted-schema GET
      required: true
      schema:
        type: string

  schemas:

    SchemaCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: >
            The name of the schema. For catalogs that support hierarchical (multi-level) schemas,
            the name may encode a nested path joined by the configured schema separator
            (`gravitino.schema.separator`, default `:`), e.g. `a:b:c` creates schema `c` under the
            existing parent schema `a:b`.
        comment:
          type: string
          description: A comment describing the schema
          nullable: true
        properties:
          type: object
          description: A map of properties for the schema
          nullable: true
          default: { }
          additionalProperties:
            type: string

    Schema:
      type: object
      description: A schema
      required:
        - name
        - audit
      properties:
        name:
          type: string
          description: The name of the schema
        comment:
          type: string
          description: A comment describing the schema
          nullable: true
        audit:
          $ref: "./openapi.yaml#/components/schemas/Audit"
        properties:
          type: object
          description: A map of properties for the schema
          nullable: true
          default: { }
          additionalProperties:
            type: string

    SchemaUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/SchemaUpdateRequest"

    SchemaUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/SetSchemaPropertyRequest"
        - $ref: "#/components/schemas/RemoveSchemaPropertyRequest"
      discriminator:
        propertyName: "@type"
        mapping:
          setProperty: "#/components/schemas/SetSchemaPropertyRequest"
          removeProperty: "#/components/schemas/RemoveSchemaPropertyRequest"

    SetSchemaPropertyRequest:
      type: object
      required:
        - "@type"
        - property
        - value
      properties:
        "@type":
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The name of the property to set
        value:
          type: string
          description: The value of the property to set
      example:
        "@type": "setProperty"
        property: "key1"
        value: "value1_new"

    RemoveSchemaPropertyRequest:
      type: object
      required:
        - "@type"
        - property
      properties:
        "@type":
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The name of the property to remove
      example: {
        "@type": "removeProperty",
        "property": "key2"
      }

  responses:
    SchemaResponse:
      description: Returns include the schema object
      content:
        application/vnd.gravitino.v1+json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                description: Status code of the response
                enum:
                  - 0
              schema:
                $ref: "#/components/schemas/Schema"
          examples:
            SchemaResponse:
              $ref: "#/components/examples/SchemaResponse"


  examples:
    SchemaListResponse:
      value: {
        "code": 0,
        "identifiers": [
          {
            "namespace": [
              "my_metalake",
              "my_hive_catalog"
            ],
            "name": "my_hive_schema"
          }
        ]
      }

    SchemaCreate:
      value: {
        "name": "my_hive_schema",
        "comment": "This is my Hive schema",
        "properties": {
          "location": "/user/hive/warehouse",
          "key1": "value1",
          "key2": "value2"
        }
      }

    SchemaResponse:
      value: {
        "code": 0,
        "schema": {
          "name": "my_hive_schema",
          "comment": "This is my Hive schema",
          "properties": {
            "key1": "value1",
            "key2": "value2",
            "location": "hdfs://0.0.0.0:9000/user/hive/warehouse"
          },
          "audit": {
            "creator": "gravitino",
            "createTime": "2023-12-08T08:37:43.531Z"
          }
        }
      }

    SchemaAlreadyExistsException:
      value: {
        "code": 1004,
        "type": "SchemaAlreadyExistsException",
        "message": "Failed to operate schema(s) [my_hive_schema] operation [CREATE] under catalog [my_hive_catalog], reason [SchemaAlreadyExistsException]",
        "stack": [
          "org.apache.gravitino.exceptions.SchemaAlreadyExistsException: Hive schema (database) 'my_hive_schema' already exists in Hive Metastore",
          "..."
        ]
      }

    NoSuchSchemaException:
      value: {
        "code": 1003,
        "type": "NoSuchSchemaException",
        "message": "Failed to operate schema(s) [my_hive_schema1] operation [LOAD] under catalog [my_hive_catalog], reason [NoSuchSchemaException]",
        "stack": [
          "org.apache.gravitino.exceptions.NoSuchSchemaException: Hive schema (database) does not exist: my_hive_schema1 in Hive Metastore",
          "..."
        ]
      }

openapi: 3.1.2
info:
  title: V1 Spectral regression fixture
  version: 1.0.0
paths:
  /api/v1/rule-probe:
    get:
      operationId: getRuleProbe
      summary: Exercise null-safe enum validation
      description: Confirms that JSON null does not crash duplicate-enum validation.
      tags: [RuleProbe]
      responses:
        "200":
          description: A deliberately invalid enum fixture.
          content:
            application/json:
              schema:
                type: [string, "null"]
                enum: [READY, READY, null]
              example: null

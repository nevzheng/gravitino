spark.master                              local[1]
spark.app.name                            Gravitino governed encryption demo
spark.plugins                             org.apache.gravitino.spark.connector.plugin.GravitinoSparkPlugin
spark.sql.gravitino.uri                   http://gravitino:8090
spark.sql.gravitino.metalake              demo
spark.sql.gravitino.enableIcebergSupport  true
spark.sql.warehouse.dir                   file:///warehouse/spark
spark.sql.session.timeZone                UTC
spark.sql.catalog.lakehouse.encryption.kms.openbao.endpoint    http://openbao-kms:8200
spark.sql.catalog.lakehouse.encryption.kms.openbao.token-file  /run/secrets/kms/token

services:
  openbao-kms:
    image: ${TRANSIT_IMAGE:-openbao/openbao:2.6.0}
    command:
      - server
      - -dev
      - -dev-no-store-token
      - -dev-listen-address=0.0.0.0:8200
      - -dev-root-token-id=${OPENBAO_DEMO_ROOT_TOKEN:-gravitino-openbao-demo-root}
    ports:
      - "${OPENBAO_KMS_PORT:-18200}:8200"
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 5s
      retries: 30
    security_opt:
      - no-new-privileges:true

  openbao-kms-bootstrap:
    image: ${TRANSIT_IMAGE:-openbao/openbao:2.6.0}
    user: "0:0"
    environment:
      VAULT_ADDR: http://openbao-kms:8200
      VAULT_TOKEN: ${OPENBAO_DEMO_ROOT_TOKEN:-gravitino-openbao-demo-root}
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap.sh"]
    volumes:
      - ./bootstrap.sh:/bootstrap/bootstrap.sh:ro
      - ./transit-policy.hcl:/bootstrap/transit-policy.hcl:ro
      - openbao-kms-client-token:/run/openbao-client
    depends_on:
      openbao-kms:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true

volumes:
  openbao-kms-client-token:
    name: gravitino-openbao-kms-client-token

name: OpenAPI Python Client

on:
  push:
    branches: ["main", "branch-*"]
    paths:
      - ".github/workflows/openapi-python-client.yml"
      - "api/**"
      - "authorizations/**"
      - "bin/**"
      - "catalogs/**"
      - "clients/openapi/**"
      - "common/**"
      - "conf/**"
      - "core/**"
      - "dev/openapi/**"
      - "docs/open-api/**"
      - "docs/build.gradle.kts"
      - "gradle/**"
      - "plugins/**"
      - "server/**"
      - "server-common/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "settings.gradle.kts"
  pull_request:
    branches: ["main", "branch-*"]
    paths:
      - ".github/workflows/openapi-python-client.yml"
      - "api/**"
      - "authorizations/**"
      - "bin/**"
      - "catalogs/**"
      - "clients/openapi/**"
      - "common/**"
      - "conf/**"
      - "core/**"
      - "dev/openapi/**"
      - "docs/open-api/**"
      - "docs/build.gradle.kts"
      - "gradle/**"
      - "plugins/**"
      - "server/**"
      - "server-common/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "settings.gradle.kts"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest endpoint contract (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build the Gravitino distribution
        run: ./gradlew -PskipWeb=true compileDistribution -x test
      - name: Run OpenAPI Python endpoint tests
        run: >-
          ./gradlew -PpythonVersion=${{ matrix.python-version }} -PskipWeb=true
          :clients:openapi:pytestEndpoint
